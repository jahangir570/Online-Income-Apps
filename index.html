<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Money Home</title>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: #ffffff; text-align: center; margin: 0; padding-bottom: 80px; }
        .bal-card { background: #1e293b; padding: 20px; margin: 15px; border-radius: 15px; border: 2px solid #38bdf8; }
        .btn { padding: 15px; margin: 10px; border-radius: 10px; font-size: 16px; font-weight: bold; width: 80%; border: none; cursor: pointer; color: white; }
        .btn-ad { background: #f59e0b; }
        .btn-daily { background: #ec4899; }
        .btn-with { background: #22c55e; }
        .input-f { width: 75%; padding: 12px; border-radius: 8px; border: 1px solid #38bdf8; font-size: 15px; margin: 5px 0; background: #0f172a; color: white; }
        .nav { position: fixed; bottom: 0; width: 100%; display: flex; justify-content: space-around; background: #1e293b; padding: 15px 0; border-top: 2px solid #38bdf8; }
        .nav-btn { background: none; border: none; font-size: 24px; cursor: pointer; }
    </style>
</head>
<body>

<div class="bal-card">
    <div>আপনার মোট পয়েন্ট</div>
    <h1 id="bal" style="font-size: 35px; color: #22c55e; margin: 5px 0;">0</h1>
</div>

<div id="content"></div>

<div class="nav">
    <button class="nav-btn" onclick="show('home')">🏠</button>
    <button class="nav-btn" onclick="show('task')">📋</button>
    <button class="nav-btn" onclick="show('refer')">👥</button>
    <button class="nav-btn" onclick="show('withdraw')">💰</button>
</div>

<script>
    let pts = parseInt(localStorage.getItem('pts')) || 0;
    
    // প্রথমবারের জন্য ১০ পয়েন্ট ফ্রি দেওয়া (যদি আগে না নিয়ে থাকে)
    if (!localStorage.getItem('gotFree10')) {
        pts += 10;
        localStorage.setItem('pts', pts);
        localStorage.setItem('gotFree10', 'true');
        alert("স্বাগতম! আপনি ১০ পয়েন্ট বোনাস পেয়েছেন।");
    }
    document.getElementById('bal').innerText = pts;

    function show(p) {
        let div = document.getElementById('content');
        if(p=='home') div.innerHTML = `<h3>বিজ্ঞাপন জোন</h3><p>প্রতি এডে ১০ পয়েন্ট</p><button class="btn btn-ad" onclick="add(10); window.open('https://link1.com')">বিজ্ঞাপন ১</button><br><button class="btn btn-ad" onclick="add(10); window.open('https://link2.com')">বিজ্ঞাপন ২</button>`;
        
        else if(p=='task') div.innerHTML = `<h3>কাজ জোন</h3><p>প্রতিদিন ৫ পয়েন্ট বোনাস</p><button class="btn btn-daily" onclick="getDaily()">ডেইলি বোনাস নিন</button>`;
        
        else if(p=='refer') div.innerHTML = `<h3>রেফার জোন</h3><p>প্রতি রেফারে ৩০০ পয়েন্ট</p><input type="text" value="t.me/online_income9_bot" class="input-f" readonly>`;
        
        else if(p=='withdraw') div.innerHTML = `<h3>উত্তোলন করুন (ন্যূনতম ১০)</h3><select id="method" class="input-f"><option value="বিকাশ">বিকাশ</option><option value="নগদ">নগদ</option></select><br><input type="number" id="wPoints" class="input-f" placeholder="পয়েন্ট"><br><input type="text" id="num" class="input-f" placeholder="আপনার নম্বর"><br><button class="btn btn-with" onclick="req()">রিকোয়েস্ট পাঠান</button>`;
    }

    function add(amt) { pts += amt; localStorage.setItem('pts', pts); document.getElementById('bal').innerText = pts; }

    function getDaily() {
        let lastDate = localStorage.getItem('lastDate');
        let today = new Date().toDateString();
        if(lastDate === today) { alert("আজকের ৫ পয়েন্ট আগেই নিয়েছেন!"); return; }
        pts += 5; localStorage.setItem('pts', pts); localStorage.setItem('lastDate', today);
        document.getElementById('bal').innerText = pts; alert("৫ পয়েন্ট পেয়েছেন!");
    }

    function req() {
        let m = document.getElementById('method').value;
        let w = parseInt(document.getElementById('wPoints').value);
        let n = document.getElementById('num').value;
        
        if(w < 10) { alert("ন্যূনতম ১০ পয়েন্ট উত্তোলন করা যাবে!"); return; }
        if(w > pts) { alert("আপনার পর্যাপ্ত পয়েন্ট নেই!"); return; }
        if(n.length < 11) { alert("সঠিক নম্বর দিন"); return; }
        
        fetch(`https://api.telegram.org/bot8347566970:AAHNEZGK9rM62mjJS7DvHJfTr44ynK8LIvA/sendMessage?chat_id=8499498098&text=🔔 উত্তোলন রিকোয়েস্ট!%0Aপদ্ধতি: ${m}%0Aপয়েন্ট: ${w}%0Aনম্বর: ${n}%0Aইউজার পয়েন্ট: ${pts}`);
        
        pts -= w; localStorage.setItem('pts', pts); document.getElementById('bal').innerText = pts;
        alert("রিকোয়েস্ট সফল! আপনার টেলিগ্রাম চেক করুন।");
    }
    
    show('home');
</script>
</body>
      </html>
