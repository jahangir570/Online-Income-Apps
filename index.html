<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Money Home</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src='//libtl.com/sdk.js' data-zone='10733336' data-sdk='show_10733336'></script>
    
    <style>
        body { font-family: sans-serif; background: #0f172a; color: #ffffff; text-align: center; margin: 0; padding-bottom: 80px; }
        .profile-corner { position: absolute; top: 10px; left: 10px; display: flex; align-items: center; gap: 5px; background: #1e293b; padding: 5px 10px; border-radius: 20px; border: 1px solid #38bdf8; font-size: 12px; }
        .bal-card { background: #1e293b; padding: 20px; margin: 50px 15px 15px 15px; border-radius: 15px; border: 2px solid #38bdf8; }
        .btn { padding: 12px; margin: 8px; border-radius: 8px; font-size: 15px; font-weight: bold; width: 80%; border: none; cursor: pointer; color: white; transition: 0.3s; }
        .btn:disabled { background: #475569 !important; cursor: not-allowed; }
        .btn-ad { background: #f59e0b; }
        .btn-task { background: #8b5cf6; }
        .btn-with { background: #22c55e; }
        .btn-daily { background: #ec4899; }
        .btn-sup { background: #0ea5e9; }
        .nav { position: fixed; bottom: 0; width: 100%; display: flex; justify-content: space-around; background: #1e293b; padding: 10px 0; border-top: 2px solid #38bdf8; }
        .nav-btn { background: none; border: none; font-size: 20px; cursor: pointer; color: white; }
        .info-text { font-size: 13px; color: #38bdf8; margin: 5px 0; font-weight: bold; }
    </style>
</head>
<body>

<div class="profile-corner">👤 <span id="user-name">Loading...</span></div>

<div class="bal-card">
    <div style="font-size: 13px;">আপনার মোট পয়েন্ট</div>
    <h1 id="bal" style="font-size: 30px; color: #22c55e; margin: 5px 0;">0</h1>
</div>

<div id="content"></div>

<div class="nav">
    <button class="nav-btn" onclick="show('home')">🏠</button>
    <button class="nav-btn" onclick="show('task')">📋</button>
    <button class="nav-btn" onclick="show('refer')">👥</button>
    <button class="nav-btn" onclick="show('withdraw')">💰</button>
    <button class="nav-btn" onclick="show('support')">🎧</button>
</div>

<script>
    let tgUser = window.Telegram.WebApp.initDataUnsafe.user;
    document.getElementById('user-name').innerText = tgUser ? tgUser.first_name : "User";
    let pts = parseInt(localStorage.getItem('pts')) || 0;
    document.getElementById('bal').innerText = pts;

    function show(p) {
        let div = document.getElementById('content');
        if(p=='home') {
            div.innerHTML = `<h3>বিজ্ঞাপন জোন</h3>
            <p class="info-text">প্রতি এডে ১০ পয়েন্ট | ১০০টি এড = ১০০০ পয়েন্ট</p>
            <button class="btn btn-ad" id="adsterra-btn" onclick="useAdsterra()">Adsterra (১ বার ১০ পয়েন্ট)</button>
            <hr>
            <button class="btn btn-ad" onclick="add(10); window.open('https://omg10.com/4/10733426')">Monetag লিংক ১</button>
            <button class="btn btn-ad" onclick="add(10); window.open('https://omg10.com/4/10733425')">Monetag লিংক ২</button>
            <button class="btn btn-ad" onclick="add(10); window.open('https://omg10.com/4/10733397')">Monetag লিংক ৩</button>
            <button class="btn btn-ad" onclick="add(10); show_10733336()">Monetag লিংক ৪ (SDK)</button>`;
            
            if(localStorage.getItem('adsterraUsed') === 'true') {
                document.getElementById('adsterra-btn').disabled = true;
                document.getElementById('adsterra-btn').innerText = "Adsterra ব্যবহার করা হয়েছে";
            }
        }
        else if(p=='task') div.innerHTML = `<h3>কাজ জোন</h3><button class="btn btn-daily" onclick="getDaily()">ডেইলি ৫ পয়েন্ট বোনাস নিন</button>`;
        else if(p=='refer') div.innerHTML = `<h3>রেফার জোন</h3><p>প্রতি রেফারে ৩০০ পয়েন্ট</p><button class="btn btn-task" onclick="alert('লিঙ্ক কপি হয়েছে!')">লিঙ্ক কপি করুন</button>`;
        else if(p=='withdraw') div.innerHTML = `<h3>উত্তোলন করুন</h3><select id="method" class="btn"><option value="বিকাশ">বিকাশ</option><option value="নগদ">নগদ</option></select><br><button class="btn btn-with" onclick="req()">রিকোয়েস্ট পাঠান</button>`;
        else if(p=='support') div.innerHTML = `<h3>সাপোর্ট জোন</h3><a href="https://t.me/jahangir_owner0"><button class="btn btn-sup">অ্যাডমিনের সাথে কথা বলুন</button></a>`;
    }

    function add(amt) { pts += amt; localStorage.setItem('pts', pts); document.getElementById('bal').innerText = pts; }
    
    function useAdsterra() {
        add(10);
        window.open('https://www.effectivegatecpm.com/fn2nth6w8p?key=eabea4db30059774d0871b8f08f7d306');
        localStorage.setItem('adsterraUsed', 'true');
        show('home');
    }

    function getDaily() { 
        let today = new Date().toDateString(); 
        if(localStorage.getItem('lastDate') === today) { alert("আজকের বোনাস আগেই নিয়েছেন!"); return; } 
        add(5); localStorage.setItem('lastDate', today); alert("৫ পয়েন্ট পেয়েছেন!"); 
    }

    function req() { alert("আপনার রিকোয়েস্ট সফল হয়েছে!"); }
    show('home');
</script>
</body>
      </html>
