<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>Money Home</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: white; text-align: center; margin: 0; padding-bottom: 80px; }
        .card { background: #1e293b; padding: 15px; margin: 10px; border-radius: 12px; border: 1px solid #334155; }
        .nav { position: fixed; bottom: 0; width: 100%; display: flex; justify-content: space-around; background: #0f172a; padding: 10px 0; border-top: 1px solid #334155; }
        button { background: #2563eb; color: white; border: none; padding: 10px 15px; border-radius: 8px; cursor: pointer; font-weight: bold; margin: 5px; }
        .input-f { width: 80%; padding: 10px; border-radius: 5px; border: none; color: black; }
    </style>
</head>
<body>

<div id="app">
    <h3>Money Home</h3>
    <div class="card">মোট পয়েন্ট: <h1 id="bal">0</h1></div>
    <div id="content"></div>
</div>

<div class="nav">
    <button onclick="show('home')">🏠</button>
    <button onclick="show('task')">📋</button>
    <button onclick="show('refer')">👥</button>
    <button onclick="show('withdraw')">💰</button>
</div>

<script>
    // আপনার বটের টোকেন এবং আইডি সেট করা আছে
    const BOT_TOKEN = "8347566970:AAHNEZGK9rM62mjJS7DvHJfTr44ynK8LIvA"; 
    const ADMIN_ID = "8499498098";
    
    // বিজ্ঞাপন লিঙ্কগুলো এখানে বসান
    const ADSTERRA_LINK = "এখানে_আপনার_Adsterra_লিঙ্ক_দিন";
    const MONETAG_LINK_1 = "এখানে_আপনার_Monetag_লিঙ্ক_১_দিন";
    const MONETAG_LINK_2 = "এখানে_আপনার_Monetag_লিঙ্ক_২_দিন";

    let pts = parseInt(localStorage.getItem('pts')) || 0;
    document.getElementById('bal').innerText = pts;

    function show(p) {
        let div = document.getElementById('content');
        if(p=='home') div.innerHTML = `<h3>বিজ্ঞাপন</h3><div class="card"><button onclick="window.open('${ADSTERRA_LINK}')">বিজ্ঞাপন ১ (Adsterra)</button></div><div class="card"><button onclick="window.open('${MONETAG_LINK_1}')">বিজ্ঞাপন ২ (Monetag)</button></div><div class="card"><button onclick="window.open('${MONETAG_LINK_2}')">বিজ্ঞাপন ৩ (Monetag)</button></div>`;
        if(p=='task') div.innerHTML = `<h3>কাজ</h3><div class="card"><button onclick="add(100)">কাজ সম্পূর্ণ করুন (+১০০ পয়েন্ট)</button></div>`;
        if(p=='refer') div.innerHTML = `<h3>রেফার</h3><div class="card"><p id="ref">t.me/online_income9_bot</p><button onclick="copyRef()">রেফার লিঙ্ক কপি করুন</button><p>প্রতি রেফারে ৩০০ পয়েন্ট পাবেন</p></div>`;
        if(p=='withdraw') div.innerHTML = `<h3>উত্তোলন</h3><div class="card"><select id="method"><option value="বিকাশ (২০০০ পয়েন্ট)">বিকাশ</option><option value="নগদ (৫০০০ পয়েন্ট)">নগদ</option></select><br><br><input id="num" class="input-f" placeholder="আপনার নম্বর"><br><br><button onclick="req()">রিকোয়েস্ট পাঠান</button></div>`;
    }

    function add(amount) { pts += amount; localStorage.setItem('pts', pts); document.getElementById('bal').innerText = pts; alert("পয়েন্ট যোগ হয়েছে!"); }
    
    function copyRef() { navigator.clipboard.writeText("t.me/online_income9_bot"); alert("লিঙ্ক কপি হয়েছে!"); }

    function req() {
        let m = document.getElementById('method').value;
        let n = document.getElementById('num').value;
        let cost = m.includes("বিকাশ") ? 2000 : 5000;
        if(n.length < 11) { alert("সঠিক নম্বর দিন"); return; }
        if(pts < cost) { alert("পর্যাপ্ত পয়েন্ট নেই!"); return; }
        
        fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${ADMIN_ID}&text=🔔 নতুন উত্তোলন রিকোয়েস্ট!%0Aপদ্ধতি: ${m}%0Aনম্বর: ${n}%0Aইউজার পয়েন্ট: ${pts}`);
        pts -= cost; localStorage.setItem('pts', pts); document.getElementById('bal').innerText = pts;
        alert("রিকোয়েস্ট সফল! অ্যাডমিনের কাছে পাঠানো হয়েছে।");
    }
</script>
</body>
  </html>
