<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>Money Home</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #ffffff; text-align: center; margin: 0; padding-bottom: 80px; }
        .bal-card { background: linear-gradient(135deg, #1e293b, #0f172a); padding: 25px; margin: 20px; border-radius: 20px; border: 1px solid #38bdf8; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .btn { padding: 15px; margin: 10px; border-radius: 12px; font-size: 16px; font-weight: bold; width: 85%; border: none; cursor: pointer; color: white; transition: 0.3s; }
        .btn:active { transform: scale(0.95); }
        .btn-ad { background: #f59e0b; }
        .btn-task { background: #8b5cf6; }
        .btn-with { background: #22c55e; }
        .btn-daily { background: #ec4899; }
        .input-f { width: 80%; padding: 12px; border-radius: 10px; border: 1px solid #38bdf8; font-size: 15px; margin: 5px 0; background: #1e293b; color: white; }
        .nav { position: fixed; bottom: 0; width: 100%; display: flex; justify-content: space-around; background: #1e293b; padding: 15px 0; border-top: 1px solid #38bdf8; z-index: 100; }
        .nav-btn { background: none; border: none; font-size: 24px; cursor: pointer; color: #94a3b8; }
        .nav-btn:hover { color: #38bdf8; }
        .info-box { background: #1e293b; padding: 15px; border-radius: 15px; margin: 10px 20px; border-left: 5px solid #38bdf8; }
        .title-text { font-size: 18px; color: #38bdf8; font-weight: bold; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="bal-card">
    <div style="font-size: 14px; color: #94a3b8;">আপনার মোট পয়েন্ট</div>
    <h1 id="bal" style="font-size: 40px; color: #22c55e; margin: 10px 0;">0</h1>
</div>

<div id="content"></div>

<div class="nav">
    <button class="nav-btn" onclick="show('home')">🏠</button>
    <button class="nav-btn" onclick="show('task')">📋</button>
    <button class="nav-btn" onclick="show('refer')">👥</button>
    <button class="nav-btn" onclick="show('withdraw')">💰</button>
</div>

<script>
    const BOT_TOKEN = "8347566970:AAHNEZGK9rM62mjJS7DvHJfTr44ynK8LIvA"; 
    const ADMIN_ID = "8499498098";
    
    let pts = parseInt(localStorage.getItem('pts')) || 0;
    document.getElementById('bal').innerText = pts;

    function show(p) {
        let div = document.getElementById('content');
        if(p=='home') div.innerHTML = `<div class="info-box"><div class="title-text">বিজ্ঞাপন জোন</div><p>প্রতি এডে ১০ পয়েন্ট</p><button class="btn btn-ad" onclick="add(10); window.open('https://link1.com')">বিজ্ঞাপন ১ দেখুন</button><button class="btn btn-ad" onclick="add(10); window.open('https://link2.com')">বিজ্ঞাপন ২ দেখুন</button></div>`;
        
        else if(p=='task') div.innerHTML = `<div class="info-box"><div class="title-text">কাজ জোন</div><p>প্রতিদিন ৫ পয়েন্ট বোনাস নিন</p><button class="btn btn-daily" onclick="getDaily()">ডেইলি বোনাস</button></div>`;
        
        else if(p=='refer') div.innerHTML = `<div class="info-box"><div class="title-text">রেফার জোন</div><p>প্রতি রেফারে ৩০০ পয়েন্ট</p><input type="text" value="t.me/online_income9_bot" class="input-f" readonly><button class="btn btn-task" onclick="copyRef()">লিঙ্ক কপি করুন</button></div>`;
        
        else if(p=='withdraw') div.innerHTML = `<div class="info-box"><div class="title-text">উত্তোলন করুন</div><select id="method" class="input-f"><option value="বিকাশ">বিকাশ</option><option value="নগদ">নগদ</option></select><input type="number" id="wPoints" class="input-f" placeholder="পয়েন্টের পরিমাণ"><input type="text" id="num" class="input-f" placeholder="আপনার নম্বর"><button class="btn btn-with" onclick="req()">রিকোয়েস্ট পাঠান</button></div>`;
    }

    function add(amt) { pts += amt; localStorage.setItem('pts', pts); document.getElementById('bal').innerText = pts; alert("পয়েন্ট যোগ হয়েছে!"); }

    function getDaily() {
        let lastDate = localStorage.getItem('lastDate');
        let today = new Date().toDateString();
        if(lastDate === today) { alert("আজকের পয়েন্ট আগেই নিয়েছেন!"); return; }
        pts += 5; localStorage.setItem('pts', pts); localStorage.setItem('lastDate', today);
        document.getElementById('bal').innerText = pts; alert("৫ পয়েন্ট পেয়েছেন!");
    }

    function copyRef() { navigator.clipboard.writeText("t.me/online_income9_bot"); alert("লিঙ্ক কপি হয়েছে!"); }

    function req() {
        let m = document.getElementById('method').value;
        let w = parseInt(document.getElementById('wPoints').value);
        let n = document.getElementById('num').value;
        if(isNaN(w) || w > pts || w < 10) { alert("ন্যূনতম ১০ পয়েন্ট লাগবে!"); return; }
        if(n.length < 11) { alert("সঠিক নম্বর দিন"); return; }
        fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${ADMIN_ID}&text=🔔 নতুন উত্তোলন রিকোয়েস্ট!%0Aপদ্ধতি: ${m}%0Aপয়েন্ট: ${w}%0Aনম্বর: ${n}%0Aইউজার পয়েন্ট: ${pts}`);
        pts -= w; localStorage.setItem('pts', pts); document.getElementById('bal').innerText = pts;
        alert("রিকোয়েস্ট সফল! আপনার টেলিগ্রামে মেসেজ চেক করুন।");
    }
    show('home');
</script>
</body>
  </html>
