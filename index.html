<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Income 9 - Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #0f172a; color: white; text-align: center; padding: 10px; font-family: sans-serif; margin-bottom: 90px; }
        .box { background: #1e293b; padding: 25px; border-radius: 15px; margin-bottom: 12px; border: 1px solid #334155; }
        .btn { padding: 12px; margin: 8px 0; width: 100%; border-radius: 10px; border: none; cursor: pointer; color: white; font-weight: bold; transition: 0.3s; }
        .btn:disabled { background: #475569 !important; cursor: not-allowed; opacity: 0.6; }
        
        .nav-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: #1e293b; display: flex; justify-content: space-around; padding: 12px 0; border-top: 2px solid #38bdf8; }
        .nav-item { color: #94a3b8; font-size: 11px; cursor: pointer; flex: 1; }
        .nav-item.active { color: #38bdf8; font-weight: bold; }
        
        .section { display: none; }
        .section.active { display: block; }
        
        input, select { padding: 12px; width: 100%; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; margin-top: 8px; box-sizing: border-box; }
        
        #timerOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.98); z-index: 9999; justify-content: center; align-items: center; flex-direction: column; }
        .loader { border: 6px solid #334155; border-top: 6px solid #38bdf8; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body onload="init()">

    <div id="timerOverlay"><div class="loader"></div><h2 id="timerText">অপেক্ষা করুন...</h2></div>

    <div id="home" class="section active">
        <div class="box">
            <h2 id="uName">ইউজার</h2>
            <p style="font-size: 28px; color: #38bdf8;">ব্যালেন্স: <span id="userBal">0</span> পয়েন্ট</p>
        </div>
        <div class="box">
            <button class="btn" style="background: #f59e0b;" id="dailyBtn" onclick="claimDaily()">ডেইলি বোনাস নিন</button>
        </div>
    </div>

    <div id="tasks" class="section">
        <div class="box">
            <h3>Adsterra টাস্ক</h3>
            <p style="font-size: 12px; color: #94a3b8;">প্রতিটি অ্যাড একবারই দেখা যাবে</p>
            
            <button class="btn" style="background: #6366f1;" id="adBtn1" onclick="startTask(1, 'আপনার_ADSTERRA_লিঙ্ক_১')">অ্যাড ১ (১০ পয়েন্ট)</button>
            <button class="btn" style="background: #6366f1;" id="adBtn2" onclick="startTask(2, 'আপনার_ADSTERRA_লিঙ্ক_২')">অ্যাড ২ (১০ পয়েন্ট)</button>
            <button class="btn" style="background: #6366f1;" id="adBtn3" onclick="startTask(3, 'আপনার_ADSTERRA_লিঙ্ক_৩')">অ্যাড ৩ (১০ পয়েন্ট)</button>
        </div>
    </div>

    <div id="refer" class="section">
        <div class="box">
            <h3>রেফার লিঙ্ক</h3>
            <input type="text" id="rLink" readonly>
            <button class="btn" style="background: #8b5cf6; margin-top:10px;" onclick="copyLink()">লিঙ্ক কপি করুন</button>
            <p style="margin-top: 20px;">মোট রেফার: <span id="refCount">0</span> জন</p>
        </div>
    </div>

    <div id="withdraw" class="section">
        <div class="box">
            <h3>উত্তোলন</h3>
            <select id="method"><option value="বিকাশ">বিকাশ</option><option value="নগদ">নগদ</option></select>
            <input type="number" id="wAmount" placeholder="পয়েন্ট"><input type="text" id="wNumber" placeholder="নাম্বার">
            <button class="btn" style="background: #10b981; margin-top:15px;" onclick="requestWithdraw()">রিকোয়েস্ট পাঠান</button>
        </div>
    </div>

    <div class="nav-bar">
        <div class="nav-item active" onclick="showSec('home', this)">হোম</div>
        <div class="nav-item" onclick="showSec('tasks', this)">টাস্ক</div>
        <div class="nav-item" onclick="showSec('refer', this)">রেফার</div>
        <div class="nav-item" onclick="showSec('withdraw', this)">উত্তোলন</div>
    </div>

<script>
    let tg = window.Telegram.WebApp;
    const _t = atob("ODM0NzU2Njk3MDpBQUhORVpHSzlyTTYybmpKUzdEdkpmVHI0NHluSzhMSXZB"); 
    const _c = atob("ODQ5OTQ5ODA5OA==");

    let bal = parseInt(atob(localStorage.getItem('_ub_v12') || btoa('0')));
    let refCount = parseInt(localStorage.getItem('_ur_v12') || '0');

    function init() {
        tg.expand();
        updateUI();
        // টেলিগ্রাম থেকে নাম সেভ করা
        if(tg.initDataUnsafe.user) {
            let name = tg.initDataUnsafe.user.first_name;
            localStorage.setItem('_u_name', name);
            document.getElementById('uName').innerText = name;
            document.getElementById('rLink').value = "https://t.me/online_income9_bot?start=" + tg.initDataUnsafe.user.id;
        } else {
            document.getElementById('uName').innerText = localStorage.getItem('_u_name') || "ইউজার";
        }
        checkButtons(); // কোন অ্যাড দেখা শেষ সেটা চেক করবে
    }

    function showSec(id, el) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        el.classList.add('active');
    }

    function startTask(id, url) {
        // একবার ব্যবহার করার চেক
        if(localStorage.getItem('task_done_'+id)) {
            alert("এই অ্যাডটি আপনি একবার দেখে ফেলেছেন!");
            return;
        }

        window.open(url, '_blank');
        document.getElementById('timerOverlay').style.display = 'flex';
        let left = 15; // ১৫ সেকেন্ডের টাইমার
        
        let interval = setInterval(() => {
            left--;
            document.getElementById('timerText').innerText = "অপেক্ষা করুন: " + left + "s";
            if(left <= 0) {
                clearInterval(interval);
                document.getElementById('timerOverlay').style.display = 'none';
                bal += 10;
                localStorage.setItem('task_done_'+id, 'true'); // একবার ব্যবহারের জন্য সেভ
                saveData();
                checkButtons();
                alert("১০ পয়েন্ট পেলেন!");
            }
        }, 1000);
    }

    function checkButtons() {
        for(let i=1; i<=3; i++) {
            if(localStorage.getItem('task_done_'+i)) {
                let btn = document.getElementById('adBtn'+i);
                if(btn) {
                    btn.disabled = true;
                    btn.innerText = "দেখা শেষ ✓";
                }
            }
        }
    }

    function requestWithdraw() {
        let amt = document.getElementById('wAmount').value;
        let num = document.getElementById('wNumber').value;
        if(amt > bal) { alert("ব্যালেন্স নেই!"); return; }
        
        let msg = `🔔 Withdraw\n👤 ${localStorage.getItem('_u_name')}\n💰 ${amt}\n📱 ${num}`;
        fetch(`https://api.telegram.org/bot${_t}/sendMessage?chat_id=${_c}&text=${encodeURIComponent(msg)}`)
        .then(() => { bal -= amt; saveData(); alert("সফল!"); });
    }

    function saveData() {
        localStorage.setItem('_ub_v12', btoa(bal.toString()));
        localStorage.setItem('_ur_v12', refCount.toString());
        updateUI();
    }

    function updateUI() {
        document.getElementById('userBal').innerText = bal;
        document.getElementById('refCount').innerText = refCount;
    }

    function copyLink() {
        let link = document.getElementById('rLink');
        link.select();
        document.execCommand('copy');
        alert("কপি হয়েছে!");
    }
</script>
</body>
  </html>
