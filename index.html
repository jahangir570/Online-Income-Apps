<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Earn Points App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #0b141a; color: white; margin: 0; padding: 0; display: flex; justify-content: center; }
        .app-container { width: 100%; max-width: 450px; padding: 20px; }
        .balance-card { background: linear-gradient(135deg, #1abc9c, #16a085); padding: 25px; border-radius: 20px; text-align: center; margin-bottom: 25px; box-shadow: 0 4px 15px rgba(26, 188, 156, 0.3); }
        .balance-amount { font-size: 40px; font-weight: bold; margin-top: 10px; }
        .btn-action { background: #1abc9c; color: white; border: none; padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; width: 100%; margin-bottom: 12px; font-size: 16px; transition: 0.3s; }
        .btn-action:active { transform: scale(0.98); opacity: 0.9; }
        #withdrawModal { display:none; position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); background:#1c272f; padding:25px; border-radius:15px; width:85%; border: 2px solid #1abc9c; z-index: 1000; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        input { width:100%; padding:12px; margin: 10px 0; border-radius: 8px; border:none; box-sizing: border-box; color: black; font-size: 16px; }
        .overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:999; }
    </style>
</head>
<body>

<div class="overlay" id="overlay"></div>

<div class="app-container">
    <div class="balance-card">
        <div>আপনার মোট পয়েন্ট</div>
        <div class="balance-amount"><span id="points">0</span></div>
    </div>

    <button class="btn-action" onclick="showAd(0, 10)">টাস্ক ১ (১০ পয়েন্ট)</button>
    <button class="btn-action" onclick="showAd(1, 15)">টাস্ক ২ (১৫ পয়েন্ট)</button>
    <button class="btn-action" onclick="showAd(2, 20)">টাস্ক ৩ (২০ পয়েন্ট)</button>
    <button class="btn-action" style="background:#e67e22;" onclick="openWithdraw()">পয়েন্ট উত্তোলন করুন</button>
</div>

<div id="withdrawModal">
    <h3 style="margin-top:0; color:#1abc9c;">পেমেন্ট রিকোয়েস্ট</h3>
    <input type="number" id="bkashNum" placeholder="বিকাশ নম্বর">
    <input type="number" id="withdrawPoints" placeholder="পয়েন্ট পরিমাণ">
    <button class="btn-action" onclick="submitWithdraw()">রিকোয়েস্ট পাঠান</button>
    <button class="btn-action" style="background:#c0392b;" onclick="closeWithdraw()">বন্ধ করুন</button>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    // পয়েন্ট লোড করা
    let points = parseInt(localStorage.getItem('userPoints')) || 0;
    document.getElementById('points').innerText = points;

    function showAd(index, reward) {
        let links = [
            "https://omg10.com/4/10733397",
            "https://omg10.com/4/10733425",
            "https://omg10.com/4/10733426"
        ];
        
        window.open(links[index], "_blank");
        
        // পয়েন্ট যোগ করা
        setTimeout(() => {
            points += reward;
            localStorage.setItem('userPoints', points);
            document.getElementById('points').innerText = points;
        }, 2000);
    }

    function openWithdraw() { 
        document.getElementById('withdrawModal').style.display = 'block'; 
        document.getElementById('overlay').style.display = 'block'; 
    }
    
    function closeWithdraw() { 
        document.getElementById('withdrawModal').style.display = 'none'; 
        document.getElementById('overlay').style.display = 'none'; 
    }
    
    function submitWithdraw() {
        const num = document.getElementById('bkashNum').value;
        const pts = document.getElementById('withdrawPoints').value;
        const botToken = "8347566970:AAHNEZGK9rM62mjJS7DvHJfTr44ynK8LIvA"; 
        const chatId = "8499498098";
        
        if(num.length >= 10 && pts > 0) {
            if(parseInt(pts) > points) {
                alert("আপনার কাছে পর্যাপ্ত পয়েন্ট নেই!");
                return;
            }

            const user = tg.initDataUnsafe?.user?.first_name || "Unknown User";
            const username = tg.initDataUnsafe?.user?.username || "No Username";

            const message = `🔔 *নতুন পেমেন্ট রিকোয়েস্ট*\n\n👤 ইউজার: ${user}\n🆔 ইউজারনেম: @${username}\n📱 বিকাশ নম্বর: ${num}\n💰 পয়েন্ট: ${pts}`;
            
            fetch(`https://api.telegram.org/bot${botToken}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(message)}&parse_mode=Markdown`);
            
            alert("আপনার রিকোয়েস্টটি সফলভাবে পাঠানো হয়েছে!");
            
            // পয়েন্ট কমিয়ে দেওয়া
            points -= parseInt(pts);
            localStorage.setItem('userPoints', points);
            document.getElementById('points').innerText = points;
            closeWithdraw();
        } else {
            alert("দয়া করে সঠিক নম্বর এবং পয়েন্ট দিন!");
        }
    }
</script>
</body>
  </html>
