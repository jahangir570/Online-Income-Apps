<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Money Home</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #0f172a; color: white; margin: 0; padding-bottom: 80px; }
        .header { background: #1e293b; padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .profile-img { width: 40px; height: 40px; border-radius: 50%; border: 2px solid #22c55e; }
        .card { background: #1e293b; padding: 20px; margin: 15px; border-radius: 20px; text-align: center; border: 1px solid #334155; }
        .btn-big { background: #ef4444; color: white; border: none; padding: 15px; width: 90%; border-radius: 15px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .nav-bottom { position: fixed; bottom: 0; width: 100%; background: #1e293b; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #334155; }
        .nav-item { text-align: center; font-size: 12px; cursor: pointer; color: #94a3b8; }
        .nav-item.active { color: #22c55e; }
        .page { display: none; }
        .active-page { display: block; }
        .input-field { width: 85%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; color: black; }
    </style>
</head>
<body>

<div class="header">
    <span>Money Home</span>
    <img id="userPhoto" class="profile-img" src="https://ui-avatars.com/api/?name=User" alt="Profile">
</div>

<div id="home" class="page active-page">
    <div class="card" style="background:#2563eb;">
        <div>মোট পয়েন্ট</div>
        <h1 id="balance">0</h1>
    </div>
</div>

<div id="work" class="page">
    <div class="header">কাজ</div>
    <div class="card">
        <p id="status">আজকের টাস্ক: 0 / 100</p>
        <button class="btn-big" onclick="doTask()">বিজ্ঞাপন দেখুন</button>
        <button class="btn-big" style="background:#22c55e" onclick="doTask()">বিজ্ঞাপন দেখুন</button>
    </div>
</div>

<div id="refer" class="page">
    <div class="header">রেফার</div>
    <div class="card">
        <p>প্রতি রেফারে ৩০০ পয়েন্ট বোনাস!</p>
        <div id="refLink" style="background:#0f172a; padding:10px; border-radius:8px; word-break:break-all;">https://t.me/MoneyHome71bot?start=USER_ID</div>
        <button class="btn-big" style="background:#0891b2" onclick="copyRef()">লিঙ্ক কপি করুন</button>
    </div>
</div>

<div id="wallet" class="page">
    <div class="header">ওয়ালেট ও ইতিহাস</div>
    <div class="card">
        <select id="method" class="input-field"><option value="বিকাশ">বিকাশ (২০০০ পয়েন্ট)</option><option value="নগদ">নগদ (৫০০০ পয়েন্ট)</option></select>
        <input type="text" id="number" class="input-field" placeholder="আপনার নম্বর">
        <button class="btn-big" style="background:#22c55e" onclick="withdraw()">পেমেন্ট রিকোয়েস্ট</button>
    </div>
    <div id="historyList" style="padding:15px;">
        <h4>উত্তোলন হিস্টরি:</h4>
    </div>
</div>

<div class="nav-bottom">
    <div class="nav-item active" onclick="showPage('home', this)">🏠 হোম</div>
    <div class="nav-item" onclick="showPage('work', this)">📋 কাজ</div>
    <div class="nav-item" onclick="showPage('refer', this)">👥 রেফার</div>
    <div class="nav-item" onclick="showPage('wallet', this)">💰 ওয়ালেট</div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    let points = parseInt(localStorage.getItem('userPoints')) || 0;
    let taskCount = parseInt(localStorage.getItem('taskCount')) || 0;

    if(tg.initDataUnsafe?.user) {
        let u = tg.initDataUnsafe.user;
        document.getElementById('refLink').innerText = "https://t.me/MoneyHome71bot?start=" + u.id;
        document.getElementById('userPhoto').src = "https://ui-avatars.com/api/?name=" + u.first_name;
    }

    function updateUI() {
        document.getElementById('balance').innerText = points;
        document.getElementById('status').innerText = `আজকের টাস্ক: ${taskCount} / 100`;
    }

    function doTask() {
        if(taskCount >= 100) { alert("আজকের টাস্ক শেষ!"); return; }
        points += 10;
        taskCount++;
        localStorage.setItem('userPoints', points);
        localStorage.setItem('taskCount', taskCount);
        updateUI();
        alert("১০ পয়েন্ট যোগ হয়েছে!");
    }

    function copyRef() {
        navigator.clipboard.writeText(document.getElementById('refLink').innerText);
        alert("লিঙ্ক কপি হয়েছে!");
    }

    function withdraw() {
        let method = document.getElementById('method').value;
        let pointsNeeded = (method === "বিকাশ") ? 2000 : 5000;
        if(points < pointsNeeded) { alert("পর্যাপ্ত পয়েন্ট নেই!"); return; }
        points -= pointsNeeded;
        localStorage.setItem('userPoints', points);
        
        let history = JSON.parse(localStorage.getItem('history') || "[]");
        history.push({method, points: pointsNeeded, date: new Date().toLocaleDateString()});
        localStorage.setItem('history', JSON.stringify(history));
        
        updateUI();
        loadHistory();
        alert("পেমেন্ট রিকোয়েস্ট সফল!");
    }

    function loadHistory() {
        let history = JSON.parse(localStorage.getItem('history') || "[]");
        document.getElementById('historyList').innerHTML = "<h4>উত্তোলন হিস্টরি:</h4>" + history.map(h => `<div class='card'>${h.method}: ${h.points} পয়েন্ট (${h.date})</div>`).join('');
    }

    function showPage(pageId, element) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
        document.getElementById(pageId).classList.add('active-page');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        element.classList.add('active');
        if(pageId === 'wallet') loadHistory();
    }
    updateUI();
</script>
</body>
  </html>
