<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Money Home</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #0f172a; color: white; margin: 0; padding-bottom: 80px; }
        .header { background: #1e293b; padding: 15px; text-align: center; font-weight: bold; font-size: 18px; }
        .card { background: #1e293b; padding: 20px; margin: 15px; border-radius: 20px; text-align: center; border: 1px solid #334155; }
        .btn-big { background: #ef4444; color: white; border: none; padding: 15px; width: 90%; border-radius: 15px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .nav-bottom { position: fixed; bottom: 0; width: 100%; background: #1e293b; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #334155; }
        .nav-item { text-align: center; font-size: 12px; cursor: pointer; color: #94a3b8; }
        .nav-item.active { color: #22c55e; }
        .page { display: none; }
        .active-page { display: block; }
        .input-field { width: 85%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; }
    </style>
</head>
<body>

<div id="home" class="page active-page">
    <div class="header">Money Home</div>
    <div class="card" style="background:#2563eb;">
        <div>মোট পয়েন্ট</div>
        <h1 id="balance">0</h1>
    </div>
</div>

<div id="work" class="page">
    <div class="header">কাজ</div>
    <div class="card">
        <p id="status">আজকের টাস্ক: 0 / 100</p>
        <button class="btn-big" onclick="doTask('adsterra')">Adsterra বিজ্ঞাপন</button>
        <button class="btn-big" style="background:#22c55e" onclick="doTask('monetag')">Monetag বিজ্ঞাপন</button>
    </div>
</div>

<div id="refer" class="page">
    <div class="header">রেফার</div>
    <div class="card">
        <p>প্রতি রেফারে ৩০০ পয়েন্ট বোনাস!</p>
        <button class="btn-big" style="background:#0891b2" onclick="copyRef()">লিঙ্ক কপি করুন</button>
    </div>
    <div style="padding: 15px;">
        <h4>রেফার করা বন্ধুদের তালিকা (মোট: <span id="refCount">0</span>)</h4>
        <div id="referList"></div>
    </div>
</div>

<div id="wallet" class="page">
    <div class="header">ওয়ালেট</div>
    <div class="card">
        <p>বিকাশ (২০০০ পয়েন্ট) | নগদ (৫০০০ পয়েন্ট)</p>
        <select id="method" class="input-field" style="color:black">
            <option value="বিকাশ">বিকাশ</option>
            <option value="নগদ">নগদ</option>
        </select>
        <input type="text" id="number" class="input-field" style="color:black" placeholder="আপনার নম্বর লিখুন">
        <button class="btn-big" style="background:#22c55e" onclick="withdraw()">পেমেন্ট রিকোয়েস্ট পাঠান</button>
    </div>
</div>

<div class="nav-bottom">
    <div class="nav-item active" onclick="showPage('home', this)">🏠<br>হোম</div>
    <div class="nav-item" onclick="showPage('work', this)">📋<br>কাজ</div>
    <div class="nav-item" onclick="showPage('refer', this)">👥<br>রেফার</div>
    <div class="nav-item" onclick="showPage('wallet', this)">💰<br>ওয়ালেট</div>
</div>

<script>
    let points = parseInt(localStorage.getItem('userPoints')) || 0;
    let taskCount = parseInt(localStorage.getItem('taskCount')) || 0;
    let referrals = JSON.parse(localStorage.getItem('myReferrals') || "[]");

    function updateUI() {
        document.getElementById('balance').innerText = points;
        document.getElementById('status').innerText = `আজকের টাস্ক: ${taskCount} / 100`;
        document.getElementById('refCount').innerText = referrals.length;
    }

    function doTask(type) {
        if(taskCount >= 100) { alert("আজকের টাস্ক শেষ!"); return; }
        points += 10;
        taskCount++;
        localStorage.setItem('userPoints', points);
        localStorage.setItem('taskCount', taskCount);
        updateUI();
        alert("১০ পয়েন্ট যোগ হয়েছে!");
    }

    function copyRef() {
        navigator.clipboard.writeText("https://t.me/MoneyHome71bot");
        alert("লিঙ্ক কপি হয়েছে!");
    }

    function withdraw() {
        let method = document.getElementById('method').value;
        let num = document.getElementById('number').value;
        let required = (method === "বিকাশ") ? 2000 : 5000;
        if(points < required) { alert("পর্যাপ্ত পয়েন্ট নেই!"); return; }
        if(num.length < 11) { alert("সঠিক নম্বর দিন"); return; }
        points -= required;
        localStorage.setItem('userPoints', points);
        updateUI();
        alert(method + " রিকোয়েস্ট সফল!");
    }

    function showPage(pageId, element) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
        document.getElementById(pageId).classList.add('active-page');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        element.classList.add('active');
    }
    updateUI();
</script>
</body>
  </html>
