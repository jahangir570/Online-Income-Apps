<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Income 9 - Secure</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #0f172a; color: white; text-align: center; padding: 10px; font-family: sans-serif; margin-bottom: 100px; overflow-x: hidden; }
        .promo-header { background: linear-gradient(90deg, #f59e0b, #d97706); padding: 15px; border-radius: 12px; margin-bottom: 15px; font-weight: bold; color: black; }
        .box { background: #1e293b; padding: 20px; border-radius: 15px; margin-bottom: 12px; border: 1px solid #334155; position: relative; }
        .profile-img { width: 75px; height: 75px; border-radius: 50%; border: 3px solid #38bdf8; margin-bottom: 10px; object-fit: cover; }
        .small-info { font-size: 11px; color: #94a3b8; margin-bottom: 8px; display: block; }
        .btn { padding: 14px; margin: 8px 0; width: 100%; border-radius: 12px; border: none; cursor: pointer; color: white; font-weight: bold; font-size: 15px; transition: 0.3s; position: relative; }
        .btn:disabled { background: #475569 !important; cursor: not-allowed; opacity: 0.8; }
        .nav-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: #1e293b; display: flex; justify-content: space-around; padding: 12px 0; border-top: 2px solid #38bdf8; z-index: 1000; }
        .nav-item { color: #94a3b8; font-size: 11px; cursor: pointer; flex: 1; text-align: center; }
        .nav-item.active { color: #38bdf8; font-weight: bold; }
        .section { display: none; }
        .section.active { display: block; }
        input, select { padding: 12px; width: 100%; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; margin-top: 8px; box-sizing: border-box; text-align: center; }
    </style>
</head>
<body onload="init()">

    <div class="promo-header">🚀 রেফার করলে ৩০০ পয়েন্ট বোনাস!</div>

    <div id="home" class="section active">
        <div class="box">
            <img id="uPic" class="profile-img" src="https://via.placeholder.com/75" alt="Profile">
            <h2 id="uName">লোডিং...</h2>
            <p style="font-size: 24px; color: #38bdf8; font-weight: bold;">ব্যালেন্স: <span id="userBal">0</span> পয়েন্ট</p>
        </div>
        <button class="btn" style="background: #f59e0b;" onclick="claimDaily()">🎁 ডেইলি বোনাস (৫ পয়েন্ট)</button>
    </div>

    <div id="tasks" class="section">
        <div class="box">
            <span class="small-info">একটি অ্যাড ১০ পয়েন্ট | ১০০টি অ্যাড = ১০০০ পয়েন্ট</span>
            <button id="btn_ad1" class="btn" style="background: #6366f1;" onclick="startTask('ad1', 'https://omg10.com/4/10733426')">অ্যাড বাটন ১ (৫০টি)</button>
            <button id="btn_ad2" class="btn" style="background: #6366f1;" onclick="startTask('ad2', 'https://bold-consequence.com/VEP0xl')">অ্যাড বাটন ২ (৫০টি)</button>
        </div>
        <div class="box">
            <p style="color: #38bdf8; font-weight: bold;">স্পেশাল টাস্ক (১০ পয়েন্ট)</p>
            <button id="ytBtn" class="btn" style="background: #ef4444;" onclick="window.open('https://www.youtube.com/@Jahangir_owner')">YouTube চ্যানেল সাবস্ক্রাইব</button>
            <button id="ads_btn" class="btn" style="background: #8b5cf6;" onclick="startTask('ads_once', 'https://www.effectivegatecpm.com/h2kfpp7yf?key=e023f627c547859ce474556b8d33c173')">Adsterra টাস্ক</button>
        </div>
    </div>

    <div id="refer" class="section">
        <div class="box">
            <h3>রেফার করে ইনকাম</h3>
            <input type="text" id="rLink" readonly>
            <button class="btn" style="background: #8b5cf6; margin-top:10px;" onclick="copyLink()">লিঙ্ক কপি করুন</button>
        </div>
    </div>

    <div id="withdraw" class="section">
        <div class="box">
            <h3>টাকা উত্তোলন</h3>
            <span class="small-info" style="color:#38bdf8;">বিকাশে সর্বনিম্ন ৩০০০ পয়েন্ট নগদে সর্বনিম্ন ৫০০০ পয়েন্ট</span>
            <select id="method"><option value="বিকাশ">বিকাশ</option><option value="নগদ">নগদ</option></select>
            <input type="number" id="wAmount" placeholder="পয়েন্টের পরিমাণ">
            <input type="text" id="wNumber" placeholder="মোবাইল নাম্বার">
            <button class="btn" style="background: #10b981; margin-top:20px;" onclick="requestWithdraw()">রিকোয়েস্ট পাঠান</button>
            <button class="btn" style="background: #0ea5e9; margin-top:10px;" onclick="window.open('https://t.me/jahangir_onlin_income1')">📊 পেমেন্ট প্রুফ চ্যানেল</button>
        </div>
    </div>

    <div id="support" class="section">
        <div class="box">
            <h3>সাপোর্ট সেন্টার</h3>
            <button class="btn" style="background: #2563eb;" onclick="window.open('https://t.me/jahangir_owner0')">💬 অ্যাডমিনের সাথে যোগাযোগ</button>
            <button class="btn" style="background: #0ea5e9; margin-top:10px;" onclick="window.open('https://t.me/jahangir_onlin_income')">📢 আমাদের মেইন চ্যানেল</button>
        </div>
    </div>

    <div class="nav-bar">
        <div class="nav-item active" onclick="showSec('home', this)">🏠 হোম</div>
        <div class="nav-item" onclick="showSec('tasks', this)">🎯 টাস্ক</div>
        <div class="nav-item" onclick="showSec('refer', this)">👥 রেফার</div>
        <div class="nav-item" onclick="showSec('withdraw', this)">💰 উইথড্র</div>
        <div class="nav-item" onclick="showSec('support', this)">🛠 সাপোর্ট</div>
    </div>

<script>
    let tg = window.Telegram.WebApp;
    const _botToken = "8743403061:AAFFOsztmCSikiDaWc8o0Wn8hjNUaiIvLX4"; 
    const _adminId = "8499498098"; 

    let bal = parseInt(atob(localStorage.getItem('_ub_j9_v99') || btoa('0')));
    let isTaskRunning = false;

    function init() {
        tg.expand();
        checkDailyReset();
        updateUI();
        if(tg.initDataUnsafe && tg.initDataUnsafe.user) {
            let u = tg.initDataUnsafe.user;
            document.getElementById('uName').innerText = u.first_name;
            if(u.photo_url) document.getElementById('uPic').src = u.photo_url;
            document.getElementById('rLink').value = "https://t.me/online_income9_bot?start=" + u.id;
        }
        updateStatus();
    }

    function checkDailyReset() {
        let today = new Date().toDateString();
        if (localStorage.getItem('_last_reset_v99') !== today) {
            localStorage.setItem('count_ad1', '0');
            localStorage.setItem('count_ad2', '0');
            localStorage.setItem('_last_reset_v99', today);
        }
    }

    function startTask(id, url) {
        if(isTaskRunning) return;
        let count = parseInt(localStorage.getItem('count_'+id)) || 0;
        
        if(id !== 'ads_once' && count >= 50) return;

        isTaskRunning = true;
        let btn = document.getElementById(id === 'ads_once' ? 'ads_btn' : 'btn_'+id);
        
        // পর্যায়ক্রমে ১৫ এবং ৩০ সেকেন্ড নির্ধারণ
        let left = (count % 2 === 0) ? 15 : 30;

        btn.disabled = true;
        window.open(url, '_blank');

        let interval = setInterval(() => {
            btn.innerText = `অপেক্ষা করুন... ${left}s`;
            left--;
            
            if(left < 0) {
                clearInterval(interval);
                bal += 10;
                if(id !== 'ads_once') localStorage.setItem('count_'+id, count + 1);
                saveData();
                isTaskRunning = false;
                updateStatus();
                alert("১০ পয়েন্ট যোগ হয়েছে!");
            }
        }, 1000);
    }

    function updateStatus() {
        ['ad1', 'ad2'].forEach(id => {
            let c = parseInt(localStorage.getItem('count_'+id)) || 0;
            let btn = document.getElementById('btn_'+id);
            if(btn) {
                if(c >= 50) { 
                    btn.disabled = true; 
                    btn.innerText = "আজকের লিমিট শেষ ✅"; 
                } else {
                    btn.disabled = false;
                    btn.innerText = `অ্যাড বাটন ${id === 'ad1' ? '১' : '২'} (${50 - c} বাকি)`;
                }
            }
        });
        // Adsterra বাটন রিসেট
        let adsBtn = document.getElementById('ads_btn');
        if(adsBtn && !isTaskRunning) adsBtn.innerText = "Adsterra টাস্ক";
    }

    function showSec(id, el) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.add('active'); el.classList.add('active');
    }

    function requestWithdraw() {
        let amt = document.getElementById('wAmount').value;
        let num = document.getElementById('wNumber').value;
        let met = document.getElementById('method').value;
        
        if(!amt || amt < 1 || amt > bal) { alert("পয়েন্ট ভুল!"); return; }
        if(!num) { alert("নম্বর দিন!"); return; }

        let msg = `💰 **উইথড্র রিকোয়েস্ট**\n\n👤 নাম: ${document.getElementById('uName').innerText}\n💸 পয়েন্ট: ${amt}\n📱 নম্বর: ${num}\n💳 মাধ্যম: ${met}`;
        fetch(`https://api.telegram.org/bot${_botToken}/sendMessage?chat_id=${_adminId}&text=${encodeURIComponent(msg)}&parse_mode=HTML`)
        .then(() => {
            bal -= parseInt(amt);
            saveData();
            alert("সফলভাবে রিকোয়েস্ট পাঠানো হয়েছে!");
        });
    }

    function saveData() { localStorage.setItem('_ub_j9_v99', btoa(bal.toString())); updateUI(); }
    function updateUI() { document.getElementById('userBal').innerText = bal; }
    function copyLink() { document.getElementById('rLink').select(); document.execCommand('copy'); alert("লিঙ্ক কপি হয়েছে!"); }
    
    function claimDaily() {
        let d = new Date().toDateString();
        if(localStorage.getItem('_daily_claim_v99') === d) alert("আজ নেওয়া শেষ!");
        else { bal += 5; localStorage.setItem('_daily_claim_v99', d); saveData(); alert("বোনাস যোগ হয়েছে!"); }
    }
</script>
</body>
</html>
