<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>Money Home</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #ffffff; text-align: center; margin: 0; padding-bottom: 150px; }
        .header { padding: 20px; font-size: 28px; font-weight: bold; color: #38bdf8; }
        .bal-card { background: linear-gradient(135deg, #1e293b, #0f172a); padding: 40px; margin: 20px; border-radius: 30px; border: 2px solid #38bdf8; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        
        /* বড় এবং ইউনিক বাটন স্টাইল */
        .big-btn { background: #1e293b; color: #fff; border: 2px solid #38bdf8; padding: 30px; margin: 15px; border-radius: 25px; font-size: 22px; font-weight: bold; width: 90%; cursor: pointer; transition: 0.3s; }
        .big-btn:active { background: #38bdf8; color: #000; }
        
        .input-f { width: 85%; padding: 25px; border-radius: 20px; border: 2px solid #38bdf8; font-size: 20px; margin-bottom: 20px; background: #0f172a; color: white; }
        .nav { position: fixed; bottom: 0; width: 100%; display: flex; justify-content: space-around; background: #1e293b; padding: 25px 0; border-top: 3px solid #38bdf8; border-radius: 30px 30px 0 0; }
        .nav-btn { background: none; border: none; font-size: 30px; cursor: pointer; }
    </style>
</head>
<body>

<div class="header">Money Home</div>
<div class="bal-card">
    <div style="font-size: 20px;">আপনার মোট পয়েন্ট</div>
    <h1 id="bal" style="font-size: 70px; color: #22c55e; margin: 10px 0;">0</h1>
</div>

<div id="content"></div>

<div class="nav">
    <button class="nav-btn" onclick="show('home')">🏠</button>
    <button class="nav-btn" onclick="show('task')">📋</button>
    <button class="nav-btn" onclick="show('refer')">👥</button>
    <button class="nav-btn" onclick="show('withdraw')">💰</button>
</div>

<script>
    const BOT_TOKEN = "8347566970:AAHNEZGK9rM62mjJS7DvHJfTr44ynK8LIvA"; 
    const ADMIN_ID = "8499498098";
    
    let pts = parseInt(localStorage.getItem('pts')) || 0;
    document.getElementById('bal').innerText = pts;

    function show(p) {
        let div = document.getElementById('content');
        if(p=='home') div.innerHTML = `<h3>বিজ্ঞাপন দেখুন</h3><button class="big-btn" onclick="window.open('https://your-ad-link.com')">বিজ্ঞাপন ১ (Adsterra)</button><button class="big-btn" onclick="window.open('https://your-monetag-link.com')">বিজ্ঞাপন ২ (Monetag)</button>`;
        
        if(p=='task') div.innerHTML = `<h3>টাস্ক জোন</h3><button class="big-btn" onclick="add(100)">টাস্ক ১: ১০০ পয়েন্ট</button><button class="big-btn" onclick="add(150)">টাস্ক ২: ১৫০ পয়েন্ট</button>`;
        
        if(p=='refer') div.innerHTML = `<h3>রেফার জোন</h3><button class="big-btn" onclick="copyRef()">রেফার লিঙ্ক কপি করুন (+৩০০ পয়েন্ট)</button>`;
        
        if(p=='withdraw') div.innerHTML = `<h3>উত্তোলন করুন</h3><select id="method" class="input-f"><option value="বিকাশ (২০০০ পয়েন্ট)">বিকাশ (২০০০ পয়েন্ট)</option><option value="নগদ (৫০০০ পয়েন্ট)">নগদ (৫০০০ পয়েন্ট)</option></select><input id="num" class="input-f" placeholder="আপনার নম্বর লিখুন"><button class="big-btn" onclick="req()" style="background:#22c55e;">উত্তোলন রিকোয়েস্ট পাঠান</button>`;
    }

    function add(amount) { pts += amount; localStorage.setItem('pts', pts); document.getElementById('bal').innerText = pts; alert("পয়েন্ট যোগ হয়েছে!"); }
    function copyRef() { navigator.clipboard.writeText("t.me/online_income9_bot"); alert("রেফার লিঙ্ক কপি হয়েছে!"); }

    function req() {
        let m = document.getElementById('method').value;
        let n = document.getElementById('num').value;
        let cost = m.includes("বিকাশ") ? 2000 : 5000;
        if(n.length < 11) { alert("দয়া করে সঠিক নম্বর দিন"); return; }
        if(pts < cost) { alert("আপনার পর্যাপ্ত পয়েন্ট নেই!"); return; }
        
        fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${ADMIN_ID}&text=🔔 নতুন উত্তোলন রিকোয়েস্ট!%0Aপদ্ধতি: ${m}%0Aনম্বর: ${n}%0Aইউজার পয়েন্ট: ${pts}`);
        pts -= cost; localStorage.setItem('pts', pts); document.getElementById('bal').innerText = pts;
        alert("রিকোয়েস্ট সফল! অ্যাডমিনের কাছে পাঠানো হয়েছে।");
    }
    
    show('home'); // শুরুর স্ক্রিন
</script>
</body>
  </html>
