<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Money Share</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src='//libtl.com/sdk.js' data-zone='10733336' data-sdk='show_10733336'></script>
    <style>
        body { font-family: sans-serif; background-color: #f8f9fa; margin: 0; padding-bottom: 80px; }
        .header { background: #27ae60; color: white; padding: 15px; text-align: center; font-weight: bold; }
        .balance-box { background: #27ae60; color: white; padding: 25px; margin: 15px; border-radius: 15px; text-align: center; }
        .nav-bottom { position: fixed; bottom: 0; width: 100%; background: #fff; display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #ddd; z-index: 1000; }
        .nav-item { text-align: center; font-size: 12px; color: #555; cursor: pointer; }
        .nav-item.active { color: #27ae60; font-weight: bold; }
        .page { display: none; padding: 15px; }
        .active-page { display: block; }
        .btn { background: #27ae60; color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; margin: 5px 0; font-weight: bold; cursor: pointer; }
        .input-field { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        .task-list { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; }
        .task-btn { background: #3498db; color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer; }
        .task-btn:disabled { background: #95a5a6; }
    </style>
</head>
<body>

<div id="home" class="page active-page">
    <div class="header">Money Share 💵</div>
    <div class="balance-box">
        <div>আপনার মোট পয়েন্ট</div>
        <h1 id="balance">0</h1>
    </div>
    <p id="taskStatus">আজকের টাস্ক: 0/100</p>
</div>

<div id="work" class="page">
    <div class="header">টাস্ক সম্পন্ন করুন</div>
    <div class="task-list" id="taskContainer"></div>
</div>

<div id="wallet" class="page">
    <div class="header">ওয়ালেট (উত্তোলন)</div>
    <div style="padding: 20px;">
        <p>বিকাশ (২০০০ পয়েন্ট = ২০ টাকা)</p>
        <p>নগদ (৫০০০ পয়েন্ট = ৫০ টাকা)</p>
        <select id="method" class="input-field">
            <option value="বিকাশ">বিকাশ</option>
            <option value="নগদ">নগদ</option>
        </select>
        <input type="text" id="number" class="input-field" placeholder="আপনার নম্বরটি লিখুন">
        <button class="btn" onclick="withdraw()">পেমেন্ট রিকোয়েস্ট পাঠান</button>
    </div>
    <div id="adminPanel" style="display:none; background:#ecf0f1; padding:10px; border-radius:10px;">
        <h4>এডমিন প্যানেল (রিকোয়েস্ট)</h4>
        <div id="requestList"></div>
    </div>
</div>

<div class="nav-bottom">
    <div class="nav-item active" onclick="showPage('home', this)">🏠<br>হোম</div>
    <div class="nav-item" onclick="showPage('work', this)">📋<br>কাজ</div>
    <div class="nav-item" onclick="showPage('wallet', this)">💰<br>ওয়ালেট</div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    let points = parseInt(localStorage.getItem('userPoints')) || 0;
    let taskCount = parseInt(localStorage.getItem('taskCount')) || 0;

    function updateUI() {
        document.getElementById('balance').innerText = points;
        document.getElementById('taskStatus').innerText = `আজকের টাস্ক: ${taskCount}/100`;
    }
    updateUI();

    function showPage(pageId, element) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
        document.getElementById(pageId).classList.add('active-page');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        element.classList.add('active');
    }

    const container = document.getElementById('taskContainer');
    for(let i=1; i<=100; i++) {
        let btn = document.createElement('button');
        btn.className = 'task-btn';
        btn.innerText = i;
        if(localStorage.getItem('task_'+i)) btn.disabled = true;
        btn.onclick = function() {
            if (typeof show_10733336 === 'function') show_10733336();
            points += 10;
            taskCount++;
            localStorage.setItem('userPoints', points);
            localStorage.setItem('taskCount', taskCount);
            localStorage.setItem('task_'+i, 'done');
            updateUI();
            this.disabled = true;
        };
        container.appendChild(btn);
    }

    function withdraw() {
        let method = document.getElementById('method').value;
        let num = document.getElementById('number').value;
        let reqPoints = (method === "বিকাশ") ? 2000 : 5000;
        if(num.length < 11) { alert("সঠিক নম্বর দিন"); return; }
        if(points < reqPoints) { alert("পর্যাপ্ত পয়েন্ট নেই!"); return; }

        let reqs = JSON.parse(localStorage.getItem('allRequests') || "[]");
        reqs.push({ user: tg.initDataUnsafe?.user?.username || "User", method: method, number: num, points: reqPoints });
        localStorage.setItem('allRequests', JSON.stringify(reqs));
        
        points -= reqPoints;
        localStorage.setItem('userPoints', points);
        updateUI();
        alert("আপনার " + method + " রিকোয়েস্ট জমা হয়েছে!");
        showAdminList();
    }

    function showAdminList() {
        if (tg.initDataUnsafe?.user?.username === "jahangir_owner0") {
            document.getElementById('adminPanel').style.display = 'block';
            let reqs = JSON.parse(localStorage.getItem('allRequests') || "[]");
            document.getElementById('requestList').innerHTML = reqs.map(r => 
                `<p style="border-bottom:1px solid #ccc;">${r.method}: ${r.number} (${r.points} প.)</p>`
            ).join('');
        }
    }
    showAdminList();
</script>
</body>
</html>
