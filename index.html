<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Money Home</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: white; text-align: center; margin: 0; padding-bottom: 80px; }
        .view-section { padding: 20px; }
        .card { background: #1e293b; padding: 20px; border-radius: 15px; margin: 15px; border: 1px solid #334155; }
        .nav { position: fixed; bottom: 0; width: 100%; display: flex; justify-content: space-around; background: #0f172a; padding: 15px 0; border-top: 1px solid #334155; }
        button { background: #2563eb; color: white; border: none; padding: 10px 15px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .input-field { width: 80%; padding: 10px; border-radius: 5px; border: none; margin-bottom: 10px; color: black; }
    </style>
</head>
<body>

<div id="view" class="view-section">
    <h3>Money Home</h3>
    <div class="card">
        <p>আপনার পয়েন্ট: <h1 id="balance">0</h1></p>
    </div>
</div>

<div class="nav">
    <button onclick="show('home')">🏠 হোম</button>
    <button onclick="show('task')">📋 কাজ</button>
    <button onclick="show('refer')">👥 রেফার</button>
    <button onclick="show('withdraw')">💰 উত্তোলন</button>
</div>

<script>
    // এখানে আপনার বটের টোকেনটি বসান
    const BOT_TOKEN = "YOUR_BOT_TOKEN_HERE"; 
    const ADMIN_ID = "8499498098";

    let points = parseInt(localStorage.getItem('points')) || 0;
    document.getElementById('balance').innerText = points;

    function show(page) {
        let v = document.getElementById('view');
        if(page == 'home') v.innerHTML = `<h3>হোম</h3><div class="card"><p>মোট পয়েন্ট: ${points}</p></div>`;
        if(page == 'task') v.innerHTML = `<h3>কাজ</h3><div class="card"><button onclick="add()">কাজ সম্পূর্ণ করুন (+১০ পয়েন্ট)</button></div>`;
        if(page == 'refer') v.innerHTML = `<h3>রেফার</h3><div class="card"><p>আপনার রেফার লিঙ্ক:</p><code>t.me/online_income9_bot</code></div>`;
        if(page == 'withdraw') v.innerHTML = `<h3>উত্তোলন</h3><div class="card"><input id="num" class="input-field" placeholder="আপনার নম্বর"><br><button onclick="req()">রিকোয়েস্ট পাঠান</button></div>`;
    }

    function add() { points += 10; localStorage.setItem('points', points); document.getElementById('balance').innerText = points; alert("পয়েন্ট যোগ হয়েছে!"); }
    
    function req() {
        let n = document.getElementById('num').value;
        if(n.length < 11) { alert("সঠিক নম্বর দিন"); return; }
        let msg = `🔔 নতুন উত্তোলন রিকোয়েস্ট!%0Aনম্বর: ${n}%0Aপয়েন্ট: ${points}`;
        
        fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${ADMIN_ID}&text=${msg}`)
        .then(() => alert("আপনার রিকোয়েস্টটি অ্যাডমিনের কাছে পাঠানো হয়েছে!"));
    }
</script>
</body>
      </html>
