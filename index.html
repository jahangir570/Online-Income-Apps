<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Income 9 - Final</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #0f172a; color: white; text-align: center; padding: 10px; font-family: sans-serif; margin-bottom: 90px; }
        .box { background: #1e293b; padding: 20px; border-radius: 15px; margin-bottom: 12px; border: 1px solid #334155; }
        .profile-img { width: 70px; height: 70px; border-radius: 50%; border: 2px solid #38bdf8; margin-bottom: 10px; }
        .btn { padding: 12px; margin: 8px 0; width: 100%; border-radius: 10px; border: none; cursor: pointer; color: white; font-weight: bold; transition: 0.3s; }
        .btn:disabled { background: #475569 !important; cursor: not-allowed; opacity: 0.5; }
        
        .nav-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: #1e293b; display: flex; justify-content: space-around; padding: 12px 0; border-top: 2px solid #38bdf8; z-index: 1000; }
        .nav-item { color: #94a3b8; font-size: 11px; cursor: pointer; flex: 1; }
        .nav-item.active { color: #38bdf8; font-weight: bold; }
        
        .section { display: none; }
        .section.active { display: block; }

        #timerOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.98); z-index: 9999; justify-content: center; align-items: center; flex-direction: column; }
        .loader { border: 6px solid #334155; border-top: 6px solid #38bdf8; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body onload="init()">

    <div id="timerOverlay"><div class="loader"></div><h2 id="timerText">অপেক্ষা করুন...</h2></div>

    <div id="home" class="section active">
        <div class="box">
            <img id="uPic" class="profile-img" src="https://via.placeholder.com/70" alt="Profile">
            <h2 id="uName" style="margin:5px 0;">ইউজার</h2>
            <p style="font-size: 24px; color: #38bdf8; font-weight: bold;">ব্যালেন্স: <span id="userBal">0</span> পয়েন্ট</p>
        </div>
        <div class="box">
            <button id="dailyBtn" class="btn" style="background: #f59e0b;" onclick="claimDaily()">ডেইলি বোনাস (৫ পয়েন্ট)</button>
            <p style="font-size: 10px; color: #94a3b8; margin-top: 5px;">*দিনে শুধুমাত্র একবার নেওয়া যাবে</p>
        </div>
    </div>

    <div id="tasks" class="section">
        <div class="box">
            <h3 style="margin-bottom: 5px;">অ্যাড টাস্ক</h3>
            <p style="font-size: 12px; color: #fbbf24; margin-top: 0;">১টি অ্যাড ১০ পয়েন্ট | ৯০টি অ্যাড ৯০০ পয়েন্ট</p>
            
            <button class="btn" style="background: #6366f1;" onclick="startTask('ad1', 'https://omg10.com/4/10733336')">বিজ্ঞাপন লিঙ্ক ১</button>
            <button class="btn" style="background: #6366f1;" onclick="startTask('ad2', 'https://omg10.com/4/10733425')">বিজ্ঞাপন লিঙ্ক ২</button>
            <button class="btn" style="background: #6366f1;" onclick="startTask('ad3', 'https://omg10.com/4/10733397')">বিজ্ঞাপন লিঙ্ক ৩</button>
            <p style="font-size: 10px; color: #94a3b8;">*প্রতি লিঙ্কে ৩০টি করে অ্যাড দেখা যাবে</p>
        </div>

        <div class="box">
            <h3>স্পেশাল টাস্ক (একবারই সম্ভব)</h3>
            <button id="adsBtn" class="btn" style="background: #8b5cf6;" onclick="startTask('ads_once', 'https://www.effectivegatecpm.com/h2kfpp7yf?key=e023f627c547859ce474556b8d33c173')">Adsterra Direct অ্যাড (১০ পয়েন্ট)</button>
            <button id="ytBtn" class="btn" style="background: #ef4444;" onclick="startTask('yt_once', 'https://www.youtube.com/@Jahangir_owner')">YouTube সাবস্ক্রাইব (১০ পয়েন্ট)</button>
        </div>
    </div>

    <div id="refer" class="section">
        <div class="box">
            <h3>রেফার লিঙ্ক</h3>
            <input type="text" id="rLink" style="width:90%; padding:10px; background:#0f172a; color:white; border:1px solid #334155; border-radius:8px;" readonly>
            <button class="btn" style="background: #8b5cf6; margin-top:10px;" onclick="copyLink()">কপি লিঙ্ক</button>
            <p>মোট রেফার: <span id="refCount">0</span> জন</p>
        </div>
    </div>

    <div id="support" class="section">
        <div class="box">
            <h3>সাপোর্ট</h3>
            <button class="btn" style="background: #0ea5e9;" onclick="window.open('https://t.me/jahangir_owner0')">এডমিন আইডি</button>
            <button class="btn" style="background: #2563eb;" onclick="window.open('https://t.me/jahangir_onlin_income')">অফিসিয়াল চ্যানেল</button>
        </div>
    </div>

    <div class="nav-bar">
        <div class="nav-item active" onclick="showSec('home', this)">হোম</div>
        <div class="nav-item" onclick="showSec('tasks', this)">টাস্ক</div>
        <div class="nav-item" onclick="showSec('refer', this)">রেফার</div>
        <div class="nav-item" onclick="showSec('support', this)">সাপোর্ট</div>
    </div>

<script>
    let tg = window.Telegram.WebApp;
    const _t = atob("ODM0NzU2Njk3MDpBQUhORVpHSzlyTTYybmpKUzdEdkpmVHI0NHluSzhMSXZB"); 
    const _c = atob("ODQ5OTQ5ODA5OA==");

    let bal = parseInt(atob(localStorage.getItem('_ub_v90_f') || btoa('0')));
    let refCount = parseInt(localStorage.getItem('_ur_v90_f') || '0');

    function init() {
        tg.expand();
        updateUI();
        if(tg.initDataUnsafe.user) {
            let u = tg.initDataUnsafe.user;
            document.getElementById('uName').innerText = u.first_name;
            if(u.photo_url) document.getElementById('uPic').src = u.photo_url;
            document.getElementById('rLink').value = "https://t.me/online_income9_bot?start=" + u.id;
        }
        checkLocks();
    }

    function showSec(id, el) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        el.classList.add('active');
    }

    function startTask(id, url) {
        // একবারের কাজের লক চেক
        if(localStorage.getItem('lock_'+id)) return;

        // ৯০টি অ্যাডের জন্য ৩০টি করে লিমিট চেক
        let adCount = 0;
        if(id.startsWith('ad')) {
            adCount = parseInt(localStorage.getItem('count_'+id)) || 0;
            if(adCount >= 30) { alert("এই লিঙ্কের আজকের ৩০টি অ্যাডের লিমিট শেষ!"); return; }
        }

        window.open(url, '_blank');
        document.getElementById('timerOverlay').style.display = 'flex';
        
        // টাইমার লজিক: প্রথমটি ১৫, পরেরটি ৩০ (Alternate)
        let left = (id.includes('once')) ? 15 : ((adCount % 2 === 0) ? 15 : 30);
        
        let interval = setInterval(() => {
            left--;
            document.getElementById('timerText').innerText = "অপেক্ষা করুন: " + left + "s";
            if(left <= 0) {
                clearInterval(interval);
                document.getElementById('timerOverlay').style.display = 'none';
                bal += 10;
                
                // লক বা কাউন্ট সেভ
                if(id.includes('once')) {
                    localStorage.setItem('lock_'+id, 'true');
                } else {
                    localStorage.setItem('count_'+id, adCount + 1);
                }
                
                saveData();
                checkLocks();
                alert("১০ পয়েন্ট যোগ হয়েছে!");
            }
        }, 1000);
    }

    function checkLocks() {
        if(localStorage.getItem('lock_ads_once')) {
            let b = document.getElementById('adsBtn');
            b.disabled = true; b.innerText = "সংগৃহীত (Locked)";
        }
        if(localStorage.getItem('lock_yt_once')) {
            let b = document.getElementById('ytBtn');
            b.disabled = true; b.innerText = "সংগৃহীত (Locked)";
        }
    }

    function claimDaily() {
        let today = new Date().toDateString();
        if(localStorage.getItem('_daily_v90') === today) {
            alert("আপনি আজ অলরেডি ৫ পয়েন্ট নিয়েছেন। কাল আবার আসবেন!");
        } else {
            bal += 5;
            localStorage.setItem('_daily_v90', today);
            saveData();
            alert("৫ পয়েন্ট বোনাস পেলেন!");
        }
    }

    function saveData() {
        localStorage.setItem('_ub_v90_f', btoa(bal.toString()));
        localStorage.setItem('_ur_v90_f', refCount.toString());
        updateUI();
    }

    function updateUI() {
        document.getElementById('userBal').innerText = bal;
        document.getElementById('refCount').innerText = refCount;
    }

    function copyLink() {
        let link = document.getElementById('rLink'); link.select();
        document.execCommand('copy'); alert("লিঙ্ক কপি হয়েছে!");
    }
</script>
</body>
  </html>
