<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Money Home</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #0f172a; color: white; margin: 0; padding-bottom: 80px; }
        .header { background: #1e293b; padding: 15px; text-align: center; font-weight: bold; border-bottom: 1px solid #334155; }
        .card { background: #1e293b; padding: 20px; margin: 15px; border-radius: 20px; text-align: center; border: 1px solid #334155; }
        .btn-big { background: #22c55e; color: white; border: none; padding: 15px; width: 90%; border-radius: 15px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .input-field { width: 85%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; color: black; }
    </style>
</head>
<body>

<div class="header">Money Home</div>
<div class="card" style="background:#2563eb;">
    <div>মোট পয়েন্ট</div>
    <h1 id="balance">0</h1>
</div>

<div class="card">
    <p>উইথড্র রিকোয়েস্ট পাঠান</p>
    <select id="method" class="input-field">
        <option value="বিকাশ">বিকাশ (২০০০ পয়েন্ট)</option>
        <option value="নগদ">নগদ (৫০০০ পয়েন্ট)</option>
    </select>
    <input type="text" id="number" class="input-field" placeholder="আপনার নম্বর">
    <button class="btn-big" onclick="withdraw()">রিকোয়েস্ট পাঠান</button>
</div>

<script>
    // এখানে আপনার বটের টোকেনটি বসান
    const BOT_TOKEN = "YOUR_BOT_TOKEN"; 
    const CHAT_ID = "8499498098";

    let points = parseInt(localStorage.getItem('userPoints')) || 0;
    document.getElementById('balance').innerText = points;

    function withdraw() {
        let method = document.getElementById('method').value;
        let num = document.getElementById('number').value;
        let pointsNeeded = (method === "বিকাশ") ? 2000 : 5000;

        if(points < pointsNeeded) { alert("পর্যাপ্ত পয়েন্ট নেই!"); return; }
        if(num.length < 11) { alert("সঠিক নম্বর দিন"); return; }

        let msg = `🔔 নতুন উইথড্র রিকোয়েস্ট!%0Aপদ্ধতি: ${method}%0Aনম্বর: ${num}%0Aপয়েন্ট: ${pointsNeeded}`;
        
        fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${msg}`)
        .then(response => {
            if (response.ok) {
                points -= pointsNeeded;
                localStorage.setItem('userPoints', points);
                document.getElementById('balance').innerText = points;
                alert("রিকোয়েস্ট সফল! অ্যাডমিনের কাছে পাঠানো হয়েছে।");
            } else {
                alert("ত্রুটি হয়েছে, টোকেনটি চেক করুন।");
            }
        });
    }
</script>
</body>
  </html>
