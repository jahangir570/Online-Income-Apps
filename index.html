<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Money Home</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: #ffffff; text-align: center; margin: 0; padding-bottom: 80px; }
        .profile-corner { position: absolute; top: 10px; left: 10px; display: flex; align-items: center; gap: 5px; background: #1e293b; padding: 5px 10px; border-radius: 20px; border: 1px solid #38bdf8; font-size: 12px; }
        .bal-card { background: #1e293b; padding: 20px; margin: 50px 15px 15px 15px; border-radius: 15px; border: 2px solid #38bdf8; }
        .btn { padding: 12px; margin: 8px; border-radius: 8px; font-size: 15px; font-weight: bold; width: 80%; border: none; cursor: pointer; color: white; transition: 0.3s; }
        .btn:active { transform: scale(0.95); }
        .btn-ad { background: #f59e0b; }
        .btn-task { background: #8b5cf6; }
        .btn-with { background: #22c55e; }
        .btn-daily { background: #ec4899; }
        .btn-sup { background: #0ea5e9; }
        .input-f { width: 70%; padding: 10px; border-radius: 8px; border: 1px solid #38bdf8; font-size: 15px; margin-bottom: 8px; background: #0f172a; color: white; }
        .nav { position: fixed; bottom: 0; width: 100%; display: flex; justify-content: space-around; background: #1e293b; padding: 10px 0; border-top: 2px solid #38bdf8; }
        .nav-btn { background: none; border: none; font-size: 20px; cursor: pointer; color: white; }
        .info-text { font-size: 13px; color: #38bdf8; margin: 5px 0; font-weight: bold; }
    </style>
</head>
<body>

<div class="profile-corner">👤 <span id="user-name">Loading...</span></div>

<div class="bal-card">
    <div style="font-size: 13px;">আপনার মোট পয়েন্ট</div>
    <h1 id="bal" style="font-size: 30px; color: #22c55e; margin: 5px 0;">0</h1>
</div>

<div id="content"></div>

<div class="nav">
    <button class="nav-btn" onclick="show('home')">🏠</button>
    <button class="nav-btn" onclick="show('task')">📋</button>
    <button class="nav-btn" onclick="show('refer')">👥</button>
    <button class="nav-btn" onclick="show('withdraw')">💰</button>
    <button class="nav-btn" onclick="show('support')">🎧</button>
</div>

<script>
    // ইউজারের নাম সেট করা
    let tgUser = window.Telegram.WebApp.initDataUnsafe.user;
    document.getElementById('user-name').innerText = tgUser ? tgUser.first_name : "User";
    
    // পয়েন্ট ম্যানেজমেন্ট
    let pts = parseInt(localStorage.getItem('pts')) || 0;
    document.getElementById('bal').innerText = pts;

    function show(p) {
        let div = document.getElementById('content');
        if(p=='home') div.innerHTML = `<h3>বিজ্ঞাপন জোন</h3><p class="info-text">প্রতি এডে ১০ পয়েন্ট</p><button class="btn btn-ad" onclick="add(10); window.open('https://link1.com')">বিজ্ঞাপন ১</button>`;
        else if(p=='task') div.innerHTML = `<h3>কাজ জোন</h3><p class="info-text">প্রতিদিন ৫ পয়েন্ট বোনাস</p><button class="btn btn-daily" onclick="getDaily()">ডেইলি বোনাস নিন</button>`;
        else if(p=='refer') div.innerHTML = `<h3>রেফার জোন</h3><p class="info-text">প্রতি রেফারে ৩০০ পয়েন্ট</p><input type="text" value="t.me/online_income9_bot" class="input-f" readonly><br><button class="btn btn-task" onclick="alert('লিঙ্ক কপি হয়েছে!')">লিঙ্ক কপি করুন</button>`;
        else if(p=='withdraw') div.innerHTML = `<h3>উত্তোলন করুন</h3><select id="method" class="input-f"><option value="বিকাশ">বিকাশ</option><option value="নগদ">নগদ</option></select><br><input type="number" id="wPoints" class="input-f" placeholder="পয়েন্ট"><br><input type="text" id="num" class="input-f" placeholder="নম্বর"><br><button class="btn btn-with" onclick="req()">রিকোয়েস্ট পাঠান</button>`;
        else if(p=='support') div.innerHTML = `<h3>সাপোর্ট জোন</h3><p class="info-text">প্রয়োজনে যোগাযোগ করুন</p><a href="https://t.me/jahangir_owner0"><button class="btn btn-sup">অ্যাডমিনের সাথে কথা বলুন</button></a>`;
    }
    
    function add(amt) { pts += amt; localStorage.setItem('pts', pts); document.getElementById('bal').innerText = pts; }
    
    function getDaily() { 
        let today = new Date().toDateString(); 
        if(localStorage.getItem('lastDate') === today) { alert("আজকের বোনাস আগেই নিয়েছেন!"); return; } 
        pts += 5; localStorage.setItem('pts', pts); localStorage.setItem('lastDate', today); 
        document.getElementById('bal').innerText = pts; alert("৫ পয়েন্ট পেয়েছেন!"); 
    }
    
    function req() { alert("আপনার রিকোয়েস্ট সফল হয়েছে! অ্যাডমিন চেক করে পেমেন্ট দিবে।"); }
    
    show('home');
</script>
</body>
                                                                      </html>
