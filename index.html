<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>টাকার বাড়ি (Money Home)</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src='//libtl.com/sdk.js' data-zone='10733336' data-sdk='show_10733336'></script>
    <style>
        body { font-family: sans-serif; background-color: #0f172a; color: white; margin: 0; padding-bottom: 80px; }
        .header { background: #1e293b; padding: 15px; text-align: center; font-weight: bold; font-size: 18px; }
        .card { background: #1e293b; padding: 20px; margin: 15px; border-radius: 20px; text-align: center; border: 1px solid #334155; }
        .btn-big { background: #ef4444; color: white; border: none; padding: 20px; width: 90%; border-radius: 15px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 20px; }
        .nav-bottom { position: fixed; bottom: 0; width: 100%; background: #1e293b; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #334155; }
        .nav-item { text-align: center; font-size: 12px; cursor: pointer; color: #94a3b8; }
        .nav-item.active { color: #22c55e; }
        .page { display: none; }
        .active-page { display: block; }
        .input-field { width: 90%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; }
    </style>
</head>
<body>

<div id="home" class="page active-page">
    <div class="header">টাকার বাড়ি (Money Home)</div>
    <div class="card" style="background:#2563eb;">
        <div>মোট ব্যালেন্স</div>
        <h1 id="balance">৳0.00</h1>
    </div>
    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; padding:15px;">
        <div class="card" onclick="showPage('wallet', document.querySelectorAll('.nav-item')[3])">➕<br>উত্তোলন</div>
        <div class="card">🕒<br>লেনদেন</div>
    </div>
</div>

<div id="work" class="page">
    <div class="header">কাজ</div>
    <div class="card">
        <p>প্রতি বিজ্ঞাপনে ১০ পয়েন্ট</p>
        <p id="status">আজকের টাস্ক: 0 / 100</p>
        <button class="btn-big" id="workBtn" onclick="doTask()">বিজ্ঞাপন দেখুন</button>
    </div>
</div>

<div id="refer" class="page">
    <div class="header">রেফার</div>
    <div class="card">
        <p>বন্ধুকে রেফার করে ১২৫ টাকা বোনাস পান!</p>
        <div style="background:#0f172a; padding:10px; border-radius:8px; font-size:12px;">https://t.me/MoneyHome71bot</div>
        <button class="btn-big" style="background:#0891b2" onclick="alert('লিঙ্ক কপি হয়েছে!')">লিঙ্ক কপি করুন</button>
    </div>
    <div style="padding:20px;">
        <h4>মোট রেফার: <span id="refCount">0</span></h4>
        <div id="referList"></div>
    </div>
</div>

<div id="wallet" class="page">
    <div class="header">ওয়ালেট</div>
    <div class="card">
        <select id="method" class="input-field" style="color:black"><option>বিকাশ</option><option>নগদ</option></select>
        <input type="text" id="number" class="input-field" style="color:black" placeholder="নম্বর">
        <button class="btn-big" style="background:#22c55e" onclick="withdraw()">পেমেন্ট রিকোয়েস্ট</button>
    </div>
</div>

<div class="nav-bottom">
    <div class="nav-item active" onclick="showPage('home', this)">🏠<br>হোম</div>
    <div class="nav-item" onclick="showPage('work', this)">📋<br>কাজ</div>
    <div class="nav-item" onclick="showPage('refer', this)">👥<br>রেফার</div>
    <div class="nav-item" onclick="showPage('wallet', this)">💰<br>ওয়ালেট</div>
</div>

<script>
    let points = parseInt(localStorage.getItem('userPoints')) || 0;
    let taskCount = parseInt(localStorage.getItem('taskCount')) || 0;

    function updateUI() {
        document.getElementById('balance').innerText = "৳" + (points / 100).toFixed(2);
        document.getElementById('status').innerText = `আজকের টাস্ক: ${taskCount} / 100`;
    }
    
    function doTask() {
        if (typeof show_10733336 === 'function') show_10733336();
        points += 10;
        taskCount++;
        localStorage.setItem('userPoints', points);
        localStorage.setItem('taskCount', taskCount);
        updateUI();
    }

    function showPage(pageId, element) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
        document.getElementById(pageId).classList.add('active-page');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        element.classList.add('active');
    }

    function withdraw() {
        alert("পেমেন্ট রিকোয়েস্ট জমা হয়েছে!");
    }
    updateUI();
</script>
</body>
                                                                </html>
