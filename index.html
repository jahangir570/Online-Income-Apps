<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Online Income 9 - Final Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #0f172a; color: white; text-align: center; padding: 10px; font-family: sans-serif; margin-bottom: 100px; overflow-x: hidden; }
        
        .refer-promo { background: #8b5cf6; color: white; padding: 12px; border-radius: 12px; margin-bottom: 15px; font-weight: bold; font-size: 15px; border: 2px solid #ddd; }
        
        .balance-box { background: #facc15; color: #000; padding: 25px; border-radius: 20px; margin-bottom: 15px; border: 2px solid #000; }
        .balance-box h2 { margin: 0; font-size: 18px; }
        .balance-box p { margin: 10px 0 0; font-size: 28px; font-weight: 900; }

        .box { background: #1e293b; padding: 20px; border-radius: 15px; margin-bottom: 12px; border: 1px solid #334155; }
        .btn { padding: 14px; margin: 8px 0; width: 100%; border-radius: 12px; border: none; cursor: pointer; color: white; font-weight: bold; font-size: 15px; display: block; text-decoration: none; text-align: center; }
        
        #strictAdOverlay {
            display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.98); z-index: 99999; justify-content: center; align-items: center; flex-direction: column;
        }
        .ad-card { width: 85%; max-width: 320px; background: white; border-radius: 20px; overflow: hidden; position: relative; color: #1e293b; }
        .ad-timer-badge { position: absolute; top: 15px; right: 15px; background: #000; color: #f59e0b; width: 40px; height: 40px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-weight: bold; border: 2px solid #f59e0b; }
        
        /* আপনার চাহিদা মতো লাল ক্রস বাটন */
        .close-ad { display: none; position: absolute; top: 10px; right: 10px; background: #ef4444; color: white; width: 35px; height: 35px; border-radius: 50%; justify-content: center; align-items: center; font-size: 22px; cursor: pointer; font-weight: bold; }

        .nav-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: #1e293b; display: flex; justify-content: space-around; padding: 12px 0; border-top: 2px solid #38bdf8; z-index: 1000; }
        .nav-item { color: #94a3b8; font-size: 10px; cursor: pointer; flex: 1; text-align: center; }
        .nav-item.active { color: #38bdf8; font-weight: bold; }
        .section { display: none; }
        .section.active { display: block; }

        input, select { padding: 12px; width: 100%; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; margin-top: 8px; box-sizing: border-box; text-align: center; }
    </style>
</head>
<body onload="init()">

    <div class="refer-promo">📢 রেফার করে ৩০০ পয়েন্ট বোনাস নিন!</div>

    <div id="strictAdOverlay">
        <div id="closeAdBtn" class="close-ad" onclick="rewardUser()">✕</div>
        <div class="ad-card">
            <div id="adShowTimer" class="ad-timer-badge">15</div>
            <img src="https://img.freepik.com/free-vector/video-player-interface-design_23-2148753238.jpg" style="width:100%">
            <div style="padding: 15px;">
                <h3>অ্যাড চলছে...</h3>
                <p style="font-size: 12px; color: #64748b;">টাইমার শেষ হলে লাল 'X' বাটনে ক্লিক দিন।</p>
            </div>
        </div>
    </div>

    <div id="home" class="section active">
        <div class="balance-box">
            <h2 id="uNameDisplay">ইউজার</h2>
            <p><span id="userBal">0</span> Points</p>
        </div>
        
        <div class="box">
            <button class="btn" style="background: #0ea5e9;" onclick="window.open('https://t.me/jahangir_onlin_income')">অফিশিয়াল চ্যানেল ১</button>
            <button class="btn" style="background: #6366f1;" onclick="window.open('https://t.me/jahangir_onlin_income1')">অফিশিয়াল চ্যানেল ২</button>
            <button class="btn" style="background: #2563eb;" onclick="window.open('https://t.me/jahangir_onlin_income2')">সাপোর্ট গ্রুপ ১</button>
            <button class="btn" style="background: #3b82f6;" onclick="window.open('https://t.me/jahangir_onlin_income3')">সাপোর্ট গ্রুপ ২</button>
        </div>
        <button class="btn" style="background: #10b981;" onclick="claimDaily()">🎁 ডেইলি বোনাস (৫ পয়েন্ট)</button>
    </div>

    <div id="tasks" class="section">
        <div class="box">
            <p>ভিডিও অ্যাড (১৫/৩০ সেকেন্ড টাইমার)</p>
            <button class="btn" style="background: #6366f1;" onclick="startInternalAd('https://bold-consequence.com/VEP0xl')">অ্যাড দেখুন ১</button>
            <button class="btn" style="background: #10b981;" onclick="startInternalAd('https://omg10.com/4/10733426')">অ্যাড দেখুন ২</button>
        </div>
        <div class="box">
            <p>স্পেশাল টাস্ক</p>
            <button id="ytBtn" class="btn" style="background: #ef4444;" onclick="startYoutubeTask()">🔴 YouTube সাবস্ক্রাইব (১০ দিন পর পর)</button>
            <button id="adstBtn" class="btn" style="background: #8b5cf6;" onclick="startAdsterra('https://www.profitablecpmratenetwork.com/h2kfpp7yf?key=e023f627c547859ce474556b8d33c173')">💜 Adsterra অ্যাড</button>
            <div id="adstTimerDisplay" style="color: #ef4444; font-size: 12px; margin-top: 5px;"></div>
        </div>
    </div>

    <div id="refer" class="section">
        <div class="box">
            <h3>👥 রেফারেল লিঙ্ক</h3>
            <input type="text" id="rLink" readonly>
            <button class="btn" style="background: #8b5cf6; margin-top:10px;" onclick="copyLink()">কপি করুন</button>
        </div>
    </div>

    <div id="withdraw" class="section">
        <div class="box">
            <h3>💰 টাকা উত্তোলন</h3>
            <button class="btn" style="background: #f59e0b;" onclick="window.open('https://t.me/jahangir_onlin_income1')">📢 পেমেন্ট প্রুফ চ্যানেল</button>
            <select id="method"><option value="বিকাশ">বিকাশ</option><option value="নগদ">নগদ</option></select>
            <input type="number" id="wAmt" placeholder="পয়েন্টের পরিমাণ">
            <input type="text" id="wNum" placeholder="মোবাইল নম্বর">
            <button class="btn" style="background: #10b981;" onclick="requestWithdraw()">রিকোয়েস্ট পাঠান</button>
        </div>
    </div>

    <div class="nav-bar">
        <div class="nav-item active" onclick="showSec('home', this)">🏠 হোম</div>
        <div class="nav-item" onclick="showSec('tasks', this)">🎯 টাস্ক</div>
        <div class="nav-item" onclick="showSec('refer', this)">👥 রেফার</div>
        <div class="nav-item" onclick="showSec('withdraw', this)">💰 উইথড্র</div>
    </div>

<script>
    let tg = window.Telegram.WebApp;
    const _botToken = "8743403061:AAFFOsztmCSikiDaWc8o0Wn8hjNUaiIvLX4"; 
    const _adminId = "8499498098"; 

    let bal = parseInt(atob(localStorage.getItem('_ub_j9_pro_v99') || btoa('0')));
    let adSeq = 0;

    function init() {
        tg.expand(); updateUI();
        if(tg.initDataUnsafe && tg.initDataUnsafe.user) {
            let u = tg.initDataUnsafe.user;
            document.getElementById('uNameDisplay').innerText = u.first_name;
            document.getElementById('rLink').value = "https://t.me/online_income9_bot?start=" + u.id;
        }
        checkAdTimer();
    }

    function startInternalAd(url) {
        window.open(url, '_blank'); // লিঙ্ক ওপেন হবে
        adSeq++;
        let wt = (adSeq % 2 === 1) ? 15 : 30;
        document.getElementById('strictAdOverlay').style.display = 'flex';
        document.getElementById('adShowTimer').innerText = wt;
        document.getElementById('closeAdBtn').style.display = 'none';

        let timer = setInterval(() => {
            wt--;
            document.getElementById('adShowTimer').innerText = wt;
            if(wt <= 0) { clearInterval(timer); document.getElementById('closeAdBtn').style.display = 'flex'; }
        }, 1000);
    }

    function rewardUser() {
        bal += 10; saveData();
        document.getElementById('strictAdOverlay').style.display = 'none';
        alert("১০ পয়েন্ট যোগ হয়েছে!");
    }

    function startYoutubeTask() {
        let last = parseInt(localStorage.getItem('_yt_lock')) || 0;
        if(Date.now() - last < 10 * 24 * 60 * 60 * 1000) { alert("১০ দিন পর আবার নিন!"); return; }
        window.open('https://www.youtube.com/@Jahangir_owner', '_blank');
        setTimeout(() => { bal += 10; localStorage.setItem('_yt_lock', Date.now()); saveData(); alert("১০ পয়েন্ট পেলেন!"); }, 10000);
    }

    function startAdsterra(url) {
        let last = parseInt(localStorage.getItem('_ads_last')) || 0;
        if(Date.now() - last < 60000) return;
        window.open(url, '_blank');
        localStorage.setItem('_ads_last', Date.now());
        bal += 10; saveData();
    }

    function checkAdTimer() {
        setInterval(() => {
            let diff = Math.floor((60000 - (Date.now() - parseInt(localStorage.getItem('_ads_last') || 0))) / 1000);
            document.getElementById('adstTimerDisplay').innerText = (diff > 0) ? `পরবর্তী অ্যাড: ${diff} সেকেন্ড` : "";
        }, 1000);
    }

    function claimDaily() {
        let d = new Date().toDateString();
        if(localStorage.getItem('_d') === d) alert("আজ নেওয়া শেষ!");
        else { bal += 5; localStorage.setItem('_d', d); saveData(); alert("৫ পয়েন্ট যোগ হয়েছে!"); }
    }

    function requestWithdraw() {
        let a = document.getElementById('wAmt').value;
        if(a < 1 || a > bal) { alert("ব্যালেন্স নেই!"); return; }
        let msg = `💰 উইথড্র রিকোয়েস্ট\n👤 নাম: ${document.getElementById('uNameDisplay').innerText}\n💸 পয়েন্ট: ${a}`;
        fetch(`https://api.telegram.org/bot${_botToken}/sendMessage?chat_id=${_adminId}&text=${encodeURIComponent(msg)}`);
        bal -= parseInt(a); saveData(); alert("রিকোয়েস্ট সফল!");
    }

    function saveData() { localStorage.setItem('_ub_j9_pro_v99', btoa(bal.toString())); updateUI(); }
    function updateUI() { document.getElementById('userBal').innerText = bal; }
    function showSec(id, el) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.add('active'); el.classList.add('active');
    }
    function copyLink() { document.getElementById('rLink').select(); document.execCommand('copy'); alert("লিঙ্ক কপি হয়েছে!"); }
</script>
</body>
</html>
