<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Income 9</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #0f172a; color: white; text-align: center; padding: 10px; font-family: sans-serif; margin-bottom: 90px; }
        /* একদম উপরে রেফার বোনাস ব্যানার */
        .promo-header { background: linear-gradient(90deg, #8b5cf6, #3b82f6); padding: 12px; border-radius: 10px; margin-bottom: 15px; font-weight: bold; font-size: 18px; border: 1px solid #60a5fa; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .box { background: #1e293b; padding: 20px; border-radius: 15px; margin-bottom: 12px; border: 1px solid #334155; }
        .profile-img { width: 70px; height: 70px; border-radius: 50%; border: 2px solid #38bdf8; margin-bottom: 10px; }
        .btn { padding: 12px; margin: 8px 0; width: 100%; border-radius: 10px; border: none; cursor: pointer; color: white; font-weight: bold; transition: 0.3s; }
        .btn:active { transform: scale(0.98); }
        
        .nav-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: #1e293b; display: flex; justify-content: space-around; padding: 12px 0; border-top: 2px solid #38bdf8; z-index: 1000; }
        .nav-item { color: #94a3b8; font-size: 11px; cursor: pointer; flex: 1; text-align: center; }
        .nav-item.active { color: #38bdf8; font-weight: bold; }
        
        .section { display: none; }
        .section.active { display: block; }
        input, select { padding: 12px; width: 100%; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; margin-top: 8px; box-sizing: border-box; text-align: center; }

        #timerOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.98); z-index: 9999; justify-content: center; align-items: center; flex-direction: column; }
        .loader { border: 6px solid #334155; border-top: 6px solid #38bdf8; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body onload="init()">

    <div class="promo-header">
        🚀 রেফার করলে ৩০০ পয়েন্ট বোনাস!
    </div>

    <div id="timerOverlay"><div class="loader"></div><h2 id="timerText">অপেক্ষা করুন...</h2></div>

    <div id="home" class="section active">
        <div class="box">
            <img id="uPic" class="profile-img" src="https://via.placeholder.com/70" alt="Profile">
            <h2 id="uName">ইউজার</h2>
            <p style="font-size: 24px; color: #38bdf8; font-weight: bold;">ব্যালেন্স: <span id="userBal">0</span> পয়েন্ট</p>
        </div>
        <div class="box">
            <button id="dailyBtn" class="btn" style="background: #f59e0b;" onclick="claimDaily()">🎁 ডেইলি বোনাস (৫ পয়েন্ট)</button>
        </div>
    </div>

    <div id="tasks" class="section">
        <div class="box">
            <p style="font-size: 13px; color: #fbbf24; font-weight: bold;">৯০টি অ্যাড দেখুন (৯০০ পয়েন্ট)</p>
            <button class="btn" style="background: #6366f1;" onclick="startTask('ad1', 'https://omg10.com/4/10733336')">বিজ্ঞাপন লিঙ্ক ১ (৩০ অ্যাড)</button>
            <button class="btn" style="background: #6366f1;" onclick="startTask('ad2', 'https://omg10.com/4/10733425')">বিজ্ঞাপন লিঙ্ক ২ (৩০ অ্যাড)</button>
            <button class="btn" style="background: #6366f1;" onclick="startTask('ad3', 'https://omg10.com/4/10733397')">বিজ্ঞাপন লিঙ্ক ৩ (৩০ অ্যাড)</button>
        </div>
    </div>

    <div id="refer" class="section">
        <div class="box">
            <h3>আপনার রেফার লিঙ্ক</h3>
            <input type="text" id="rLink" readonly>
            <button class="btn" style="background: #8b5cf6; margin-top:10px;" onclick="copyLink()">কপি করুন</button>
            <p style="font-size: 12px; margin-top: 15px; color: #94a3b8;">বন্ধু জয়েন করে স্টার্ট করলে পাবেন ৩০০ পয়েন্ট।</p>
        </div>
    </div>

    <div id="withdraw" class="section">
        <div class="box">
            <h3>পয়েন্ট উত্তোলন</h3>
            <select id="method"><option value="বিকাশ">বিকাশ</option><option value="নগদ">নগদ</option></select>
            <input type="number" id="wAmount" placeholder="পয়েন্টের পরিমাণ">
            <input type="text" id="wNumber" placeholder="মোবাইল নাম্বার">
            <button class="btn" style="background: #10b981; margin-top:15px;" onclick="requestWithdraw()">রিকোয়েস্ট পাঠান</button>
        </div>
    </div>

    <div id="support" class="section">
        <div class="box">
            <h3>হেল্প ও সাপোর্ট</h3>
            <p style="font-size: 13px; color: #94a3b8; margin-bottom: 10px;">যেকোনো প্রয়োজনে আমাদের সাথে থাকুন</p>
            <button class="btn" style="background: #0ea5e9;" onclick="window.open('https://t.me/jahangir_owner0')">💬 এডমিন সাপোর্ট</button>
            <button class="btn" style="background: #2563eb;" onclick="window.open('https://t.me/jahangir_onlin_income')">📢 জয়েন চ্যানেল</button>
        </div>
    </div>

    <div class="nav-bar">
        <div class="nav-item active" onclick="showSec('home', this)">হোম</div>
        <div class="nav-item" onclick="showSec('tasks', this)">টাস্ক</div>
        <div class="nav-item" onclick="showSec('refer', this)">রেফার</div>
        <div class="nav-item" onclick="showSec('withdraw', this)">উত্তোলন</div>
        <div class="nav-item" onclick="showSec('support', this)">সাপোর্ট</div>
    </div>

<script>
    let tg = window.Telegram.WebApp;
    const _t = "8347566970:AAHNEZGK9rM62njJS7DvJfTr44ynK8LIvA"; 
    const _c = "8499498098"; 

    let bal = parseInt(atob(localStorage.getItem('_ub_j9_final_all') || btoa('0')));

    function init() {
        tg.expand();
        updateUI();
        if(tg.initDataUnsafe.user) {
            let u = tg.initDataUnsafe.user;
            document.getElementById('uName').innerText = u.first_name;
            if(u.photo_url) document.getElementById('uPic').src = u.photo_url;
            document.getElementById('rLink').value = "https://t.me/online_income9_bot?start=" + u.id;
        }
    }

    function showSec(id, el) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        el.classList.add('active');
    }

    function startTask(id, url) {
        let count = parseInt(localStorage.getItem('count_'+id)) || 0;
        if(count >= 30) { alert("সীমা শেষ!"); return; }
        
        window.open(url, '_blank');
        document.getElementById('timerOverlay').style.display = 'flex';
        let left = (count % 2 === 0) ? 15 : 30;
        
        let interval = setInterval(() => {
            left--;
            document.getElementById('timerText').innerText = "অপেক্ষা করুন: " + left + "s";
            if(left <= 0) {
                clearInterval(interval);
                document.getElementById('timerOverlay').style.display = 'none';
                bal += 10;
                localStorage.setItem('count_'+id, count + 1);
                saveData();
                alert("১০ পয়েন্ট সফলভাবে যোগ হয়েছে!");
            }
        }, 1000);
    }

    function requestWithdraw() {
        let amt = document.getElementById('wAmount').value;
        let num = document.getElementById('wNumber').value;
        let met = document.getElementById('method').value;
        if(!amt || !num || amt > bal) { alert("সঠিক তথ্য দিন!"); return; }
        
        let msg = `💰 **উত্তোলন রিকোয়েস্ট**\n\n👤 ইউজার: ${document.getElementById('uName').innerText}\n💸 পয়েন্ট: ${amt}\n📱 নাম্বার: ${num}\n💳 মেথড: ${met}`;
        fetch(`https://api.telegram.org/bot${_t}/sendMessage?chat_id=${_c}&text=${encodeURIComponent(msg)}&parse_mode=HTML`)
        .then(() => { bal -= amt; saveData(); alert("রিকোয়েস্ট পাঠানো হয়েছে!"); });
    }

    function claimDaily() {
        let d = new Date().toDateString();
        if(localStorage.getItem('_d_j9_all') === d) alert("আজ নেওয়া শেষ!");
        else { bal += 5; localStorage.setItem('_d_j9_all', d); saveData(); alert("বোনাস যোগ হয়েছে!"); }
    }

    function saveData() { localStorage.setItem('_ub_j9_final_all', btoa(bal.toString())); updateUI(); }
    function updateUI() { document.getElementById('userBal').innerText = bal; }
    function copyLink() { let link = document.getElementById('rLink'); link.select(); document.execCommand('copy'); alert("লিঙ্ক কপি হয়েছে!"); }
</script>
</body>
  </html>
